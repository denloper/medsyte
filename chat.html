<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8BAF8B">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233D8B4E'/><text x='50' y='65' font-size='60' text-anchor='middle'>🩺</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
  <title>ИИ-чат</title>
  <style>
    /* ═══════════════════════════════════════════════════════
       СБРОС БЕЛЫХ БОРДЮРОВ — КРИТИЧЕСКИ ВАЖНО
       ═══════════════════════════════════════════════════════ */
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      background: var(--bg) !important;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body { padding-bottom: 0 !important; }

    .chat-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      overflow: hidden;
    }

    /* ═══ HEADER ═══ */
    .chat-hdr {
      background: var(--surface);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
      z-index: 10;
      flex-shrink: 0;
      border: none;
    }
    .chat-hdr-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #A8C5A0, var(--green));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(61,139,78,0.3);
    }
    .chat-hdr-info { flex: 1; }
    .chat-hdr-name { font-size: 16px; font-weight: 800; color: var(--dark); }
    .chat-hdr-status { font-size: 12px; color: var(--green); font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .chat-hdr-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ═══ MESSAGES AREA ═══ */
    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      background: var(--bg);
      border: none;
    }
    .chat-scroll::-webkit-scrollbar { width: 4px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

    .msg { display: flex; gap: 8px; max-width: 88%; animation: msgIn 0.3s ease; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai { align-self: flex-start; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      border: none;
    }
    .msg.ai .msg-avatar { background: linear-gradient(135deg, #A8C5A0, var(--green)); box-shadow: 0 2px 6px rgba(61,139,78,0.2); }
    .msg.user .msg-avatar { background: var(--dark); color: white; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
      overflow-wrap: break-word;
      border: none;
      outline: none;
    }
    .msg.user .msg-bubble {
      background: var(--green);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(61,139,78,0.2);
    }
    .msg.ai .msg-bubble {
      background: var(--surface);
      color: var(--text-1);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .msg.ai .msg-bubble strong { color: var(--dark); font-weight: 700; }
    .msg.ai .msg-bubble em { font-style: italic; }
    .msg.ai .msg-bubble code {
      background: var(--surface-2);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
    }
    .msg.ai .msg-bubble ul, .msg.ai .msg-bubble ol {
      margin: 6px 0;
      padding-left: 20px;
    }
    .msg.ai .msg-bubble li { margin: 2px 0; }

    .msg-time { font-size: 10px; color: var(--text-3); margin-top: 4px; text-align: right; }
    .msg.user .msg-time { color: rgba(255,255,255,0.7); }

    /* ═══ DATE DIVIDER ═══ */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-3);
      font-size: 11px;
      font-weight: 600;
      margin: 8px 0;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.08);
    }

    /* ═══ TYPING ═══ */
    .typing-row { display: flex; gap: 8px; align-self: flex-start; animation: msgIn 0.3s ease; }
    .typing-bubble {
      background: var(--surface);
      padding: 14px 18px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      display: flex; gap: 5px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border: none;
    }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-3);
      animation: tBounce 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tBounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ═══ INPUT BAR (БЕЗ БОРДЮРОВ) ═══ */
    .chat-bar {
      background: var(--surface);
      padding: 12px 16px 24px;
      flex-shrink: 0;
      border: none;
      box-shadow: 0 -1px 0 rgba(0,0,0,0.04);
    }
    @supports (padding: env(safe-area-inset-bottom)) {
      .chat-bar { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    }

    .chat-bar-inner {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input-wrap {
      flex: 1;
      background: var(--surface-2);
      border-radius: 24px;
      padding: 4px 4px 4px 16px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      border: 1.5px solid transparent;
      transition: border-color 0.2s;
    }
    .chat-input-wrap:focus-within { border-color: var(--green); }

    .chat-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      font-size: 15px;
      color: var(--text-1);
      resize: none;
      max-height: 100px;
      min-height: 24px;
      line-height: 1.5;
      padding: 8px 0;
    }
    .chat-input::placeholder { color: var(--text-3); }
    .chat-input:disabled { opacity: 0.6; }

    .voice-btn {
      width: 36px; height: 36px;
      border-radius: 50%; border: none;
      background: transparent;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .voice-btn:hover { background: rgba(61,139,78,0.1); }
    .voice-btn.recording {
      background: var(--red);
      color: white;
      animation: pulse-red 1.5s infinite;
    }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.5); }
      50% { box-shadow: 0 0 0 8px rgba(230,57,70,0); }
    }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%; border: none;
      background: var(--green);
      color: white; font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(61,139,78,0.3);
    }
    .send-btn:hover:not(:disabled) { background: var(--green-light); transform: scale(1.05); }
    .send-btn:disabled { background: #C8DCC8; cursor: not-allowed; box-shadow: none; }

    /* ═══ QUICK QUESTIONS ═══ */
    .quick-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 4px;
      scrollbar-width: none;
    }
    .quick-row::-webkit-scrollbar { display: none; }
    .quick-chip {
      padding: 7px 14px;
      background: var(--surface-2);
      border: 1px solid #C8DCC8;
      border-radius: var(--r-full);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      font-family: inherit;
      color: var(--text-2);
    }
    .quick-chip:hover:not(:disabled) { border-color: var(--green); color: var(--green); background: rgba(61,139,78,0.06); }
    .quick-chip:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ═══ DISCLAIMER (БЕЗ БОРДЮРА) ═══ */
    .chat-disclaimer-bar {
      font-size: 11px;
      color: var(--text-3);
      text-align: center;
      padding: 6px 16px;
      background: rgba(244,162,97,0.06);
      border: none;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="chat-page">

  <!-- HEADER -->
  <div class="chat-hdr">
    <a href="index.html" class="circle-btn ripple-element" style="width:36px;height:36px;font-size:14px;">←</a>
    <div class="chat-hdr-avatar">🤖</div>
    <div class="chat-hdr-info">
      <div class="chat-hdr-name">Медицинский AI</div>
      <div class="chat-hdr-status"><span class="chat-hdr-dot"></span> Онлайн</div>
    </div>
    <button onclick="clearChat()" class="circle-btn ripple-element" style="width:36px;height:36px;font-size:14px;" title="Очистить чат">🗑</button>
  </div>

  <!-- MESSAGES -->
  <div class="chat-scroll" id="chatScroll"></div>

  <!-- INPUT -->
  <div class="chat-bar">
    <div class="quick-row" id="quickRow">
      <button class="quick-chip" data-q="Болит голова уже 2 дня">🤕 Головная боль</button>
      <button class="quick-chip" data-q="Постоянная усталость и слабость">😴 Хроническая усталость</button>
      <button class="quick-chip" data-q="Болит живот после еды">🤢 Боль в животе</button>
      <button class="quick-chip" data-q="Повышенное давление">💔 Давление</button>
      <button class="quick-chip" data-q="Выпадают волосы и слоятся ногти">💇 Выпадение волос</button>
    </div>
    <div class="chat-bar-inner">
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="Задайте медицинский вопрос..." rows="1"></textarea>
        <button class="voice-btn" id="voiceBtn" title="Голосовой ввод">🎤</button>
      </div>
      <button class="send-btn" id="sendBtn" title="Отправить">➤</button>
    </div>
  </div>

  <div class="chat-disclaimer-bar">⚠️ AI не заменяет врача. При экстренных симптомах звоните 112.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="database.js"></script>
<script src="patient-profile.js"></script>
<script src="ai-assistant.js"></script>
<script>
(function(){
  'use strict';

  // ═══════════════════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════════════════
  const STORAGE_KEY = 'chat_history_v2';
  const MAX_STORED = 50;
  let chatHistory = [];
  let isGenerating = false;
  let sendLock = false;

  // ═══════════════════════════════════════════════════════
  //  DOM REFS
  // ═══════════════════════════════════════════════════════
  const scroll    = document.getElementById('chatScroll');
  const input     = document.getElementById('chatInput');
  const sendBtn   = document.getElementById('sendBtn');
  const voiceBtn  = document.getElementById('voiceBtn');
  const quickRow  = document.getElementById('quickRow');

  // ═══════════════════════════════════════════════════════
  //  UTILS
  // ═══════════════════════════════════════════════════════
  function escapeHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTime(ts) {
    const d = ts ? new Date(ts) : new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function formatDateLabel(ts) {
    const d = new Date(ts);
    const today = new Date();
    const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'Сегодня';
    if (d.toDateString() === yesterday.toDateString()) return 'Вчера';
    return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
  }

  function formatAI(text) {
    if (!text) return '';
    let s = escapeHtml(text);
    
    // Красивое форматирование единиц в тексте AI
    if (window.formatUnit) {
      // Заменяем ^N на надстрочные в тексте ответа
      s = s.replace(/\^(\d+)/g, (match, digits) => {
        const superscriptMap = {
          '0': '⁰', '1': '¹', '2': '²', '3': '³', '4': '⁴',
          '5': '⁵', '6': '⁶', '7': '⁷', '8': '⁸', '9': '⁹'
        };
        return digits.split('').map(d => superscriptMap[d] || d).join('');
      });
    }
    
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[\s(])\*([^*\n]+)\*([\s).,!?]|$)/g, '$1<em>$2</em>$3');
    s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    s = s.replace(/(^|\n)([\s]*)([•\-\*])\s+([^\n]+)/g, (_, pre, indent, bullet, content) => {
      return pre + '<li>' + content + '</li>';
    });
    s = s.replace(/(<li>[^]*?<\/li>)+/g, match => '<ul>' + match + '</ul>');
    s = s.replace(/\n/g, '<br>');
    s = s.replace(/<br>\s*(<\/?ul>|<\/?li>)/g, '$1');
    s = s.replace(/(<\/?ul>|<\/?li>)\s*<br>/g, '$1');
    return s;
  }

  // ═══════════════════════════════════════════════════════
  //  PERSISTENCE
  // ═══════════════════════════════════════════════════════
  function saveHistory() {
    try {
      const toSave = chatHistory.slice(-MAX_STORED);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    } catch (e) {
      console.warn('Failed to save chat history:', e);
    }
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) chatHistory = JSON.parse(raw) || [];
    } catch (e) {
      console.warn('Failed to load chat history:', e);
      chatHistory = [];
    }
  }

  // ═══════════════════════════════════════════════════════
  //  RENDER
  // ═══════════════════════════════════════════════════════
  function renderMessage(msg) {
    const div = document.createElement('div');
    div.className = 'msg ' + msg.role;
    const avatar = msg.role === 'user' ? '👤' : '🤖';
    const content = msg.role === 'user'
      ? escapeHtml(msg.content).replace(/\n/g, '<br>')
      : formatAI(msg.content);

    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div style="flex:1;min-width:0;">
        <div class="msg-bubble">${content}</div>
        <div class="msg-time">${formatTime(msg.timestamp)}</div>
      </div>
    `;
    return div;
  }

  function renderHistory() {
    scroll.innerHTML = '';

    if (chatHistory.length === 0) {
      const welcome = {
        role: 'ai',
        content: 'Здравствуйте! Я ваш медицинский AI-диагност 🩺\n\nЯ не ставлю диагнозы по одному симптому. Вместо этого я задам вам несколько уточняющих вопросов, чтобы собрать полный анамнез — как это сделал бы опытный врач на приёме.\n\n**Как это работает:**\n1. Вы описываете симптом или проблему\n2. Я задаю 3-5 уточняющих вопросов\n3. После сбора анамнеза даю предварительный анализ с возможными причинами и рекомендациями\n\n**Чем могу помочь:**\n• 🔬 Расшифровка анализов\n• 🩺 Анализ симптомов (с сбором анамнеза)\n• 💊 Рекомендации при отклонениях\n• 👨‍⚕️ Подбор специалистов\n\nОпишите, что вас беспокоит, и мы разберёмся вместе!',
        timestamp: Date.now()
      };
      scroll.appendChild(renderMessage(welcome));
      return;
    }

    let lastDate = null;
    chatHistory.forEach(msg => {
      const msgDate = new Date(msg.timestamp).toDateString();
      if (msgDate !== lastDate) {
        const divider = document.createElement('div');
        divider.className = 'date-divider';
        divider.textContent = formatDateLabel(msg.timestamp);
        scroll.appendChild(divider);
        lastDate = msgDate;
      }
      scroll.appendChild(renderMessage(msg));
    });

    scrollToBottom();
  }

  function appendMessage(msg) {
    scroll.appendChild(renderMessage(msg));
    scrollToBottom();
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      scroll.scrollTop = scroll.scrollHeight;
    });
  }

  // ═══════════════════════════════════════════════════════
  //  TYPING INDICATOR
  // ═══════════════════════════════════════════════════════
  function showTyping() {
    hideTyping();
    const div = document.createElement('div');
    div.className = 'typing-row';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-avatar" style="background:linear-gradient(135deg,#A8C5A0,var(--green));box-shadow:0 2px 6px rgba(61,139,78,0.2);">🤖</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    scroll.appendChild(div);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ═══════════════════════════════════════════════════════
  //  UI STATE
  // ═══════════════════════════════════════════════════════
  function setGeneratingState(state) {
    isGenerating = state;
    sendLock = state;
    sendBtn.disabled = state;
    input.disabled = state;

    quickRow.querySelectorAll('.quick-chip').forEach(btn => {
      btn.disabled = state;
    });

    if (state) {
      sendBtn.innerHTML = '<span class="typing-dot" style="width:6px;height:6px;background:white;"></span>';
    } else {
      sendBtn.innerHTML = '➤';
    }
  }

  // ═══════════════════════════════════════════════════════
  //  TEXTAREA AUTO-RESIZE
  // ═══════════════════════════════════════════════════════
  function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  // ═══════════════════════════════════════════════════════
  //  SEND MESSAGE
  // ═══════════════════════════════════════════════════════
  async function sendMessage() {
    if (sendLock || isGenerating) return;

    const text = input.value.trim();
    if (!text) return;

    sendLock = true;
    setGeneratingState(true);

    input.value = '';
    input.style.height = 'auto';

    const userMsg = { role: 'user', content: text, timestamp: Date.now() };
    chatHistory.push(userMsg);
    appendMessage(userMsg);
    saveHistory();

    showTyping();

    try {
      if (!window.AIAssistant || typeof window.AIAssistant.sendMessage !== 'function') {
        throw new Error('AI-ассистент ещё не загрузился. Попробуйте через секунду.');
      }

      const result = await window.AIAssistant.sendMessage(text);

      hideTyping();

      const reply = result?.reply || result?.content || result?.text;
      if (!reply || typeof reply !== 'string' || reply.trim().length === 0) {
        throw new Error('Пустой ответ от AI. Попробуйте ещё раз.');
      }

      const aiMsg = { role: 'ai', content: reply, timestamp: Date.now() };
      chatHistory.push(aiMsg);
      appendMessage(aiMsg);
      saveHistory();

    } catch (err) {
      console.error('Chat error:', err);
      hideTyping();

      const errMsg = {
        role: 'ai',
        content: '⚠️ Извините, произошла ошибка: ' + (err.message || 'неизвестная ошибка') + '\n\nПопробуйте задать вопрос ещё раз.',
        timestamp: Date.now()
      };
      chatHistory.push(errMsg);
      appendMessage(errMsg);
      saveHistory();

    } finally {
      setGeneratingState(false);
      input.focus();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  VOICE INPUT
  // ═══════════════════════════════════════════════════════
  let recognition = null;
  function toggleVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert('Голосовой ввод не поддерживается вашим браузером');
      return;
    }

    if (recognition) {
      recognition.stop();
      recognition = null;
      voiceBtn.classList.remove('recording');
      return;
    }

    recognition = new SR();
    recognition.lang = 'ru-RU';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => voiceBtn.classList.add('recording');
    recognition.onend = () => {
      voiceBtn.classList.remove('recording');
      recognition = null;
    };
    recognition.onerror = (e) => {
      console.warn('Voice error:', e.error);
      voiceBtn.classList.remove('recording');
      recognition = null;
    };
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      if (transcript) {
        input.value = transcript;
        autoGrow(input);
        setTimeout(() => sendMessage(), 300);
      }
    };

    try {
      recognition.start();
    } catch (e) {
      console.warn('Voice start failed:', e);
    }
  }

  // ═══════════════════════════════════════════════════════
  //  CLEAR CHAT
  // ═══════════════════════════════════════════════════════
  function clearChat() {
    if (isGenerating) return;
    if (!confirm('Очистить историю чата?')) return;

    chatHistory = [];
    saveHistory();

    if (window.AIAssistant && typeof window.AIAssistant.clearHistory === 'function') {
      try { window.AIAssistant.clearHistory(); } catch (e) {}
    }

    renderHistory();
  }

  // ═══════════════════════════════════════════════════════
  //  EVENT LISTENERS
  // ═══════════════════════════════════════════════════════
  sendBtn.addEventListener('click', (e) => {
    e.preventDefault();
    sendMessage();
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', () => autoGrow(input));

  voiceBtn.addEventListener('click', toggleVoice);

  quickRow.addEventListener('click', (e) => {
    const chip = e.target.closest('.quick-chip');
    if (!chip || chip.disabled) return;
    const q = chip.dataset.q;
    if (q) {
      input.value = q;
      sendMessage();
    }
  });

  // ═══════════════════════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════════════════════
  loadHistory();
  renderHistory();

  const pending = sessionStorage.getItem('pending_chat_message');
  if (pending) {
    sessionStorage.removeItem('pending_chat_message');
    const trySend = (attempts = 0) => {
      if (window.AIAssistant && typeof window.AIAssistant.sendMessage === 'function') {
        input.value = pending;
        setTimeout(() => sendMessage(), 400);
      } else if (attempts < 20) {
        setTimeout(() => trySend(attempts + 1), 200);
      } else {
        console.warn('AI Assistant not ready after 4s');
        input.value = pending;
      }
    };
    trySend();
  }

  setTimeout(() => input.focus(), 300);

})();
</script>
</body>
</html>
