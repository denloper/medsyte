<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8BAF8B">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233D8B4E'/><text x='50' y='65' font-size='60' text-anchor='middle'>💡</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
  <title>Персональные рекомендации</title>
</head>
<body>

<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span id="toastText">Готово</span>
</div>

<div class="app">
  
  <!-- Header -->
  <div class="patient-card animate-on-scroll animate-fade-up" style="padding: 16px 20px;">
    <div class="pc-top" style="margin-bottom: 0;">
      <div class="pc-identity">
        <a href="index.html" class="circle-btn ripple-element">←</a>
        <div>
          <div class="pc-name">💡 Рекомендации</div>
          <div class="pc-id">На основе ваших анализов</div>
        </div>
      </div>
      <button class="circle-btn dark-btn ripple-element" onclick="refreshRecommendations()">🔄</button>
    </div>
  </div>

  <!-- Пустое состояние -->
  <div id="emptyState" class="empty-state" style="display: none;">
    <div class="empty-icon">💡</div>
    <div class="empty-title">Нет данных для анализа</div>
    <div class="empty-sub">Загрузите анализы, чтобы получить персональные рекомендации</div>
    <a href="upload.html" class="empty-btn ripple-element magnetic-btn">📄 Загрузить анализ</a>
  </div>

  <!-- Контент -->
  <div id="content" style="display: none;">
    
    <!-- Сводка -->
    <div class="sec-hd animate-on-scroll animate-slide-left">
      <h2>Общая сводка</h2>
    </div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;">
      <div class="v-card tilt-card ripple-element">
        <div class="v-icon green breathe">✓</div>
        <div class="v-label">В норме</div>
        <div class="v-value"><span id="statNormal">0</span></div>
      </div>
      <div class="v-card tilt-card ripple-element">
        <div class="v-icon amber breathe">⚠️</div>
        <div class="v-label">Требуют внимания</div>
        <div class="v-value"><span id="statWarning">0</span></div>
      </div>
      <div class="v-card tilt-card ripple-element">
        <div class="v-icon red breathe">🚨</div>
        <div class="v-label">Критично</div>
        <div class="v-value"><span id="statCritical">0</span></div>
      </div>
    </div>

    <!-- Рекомендации -->
    <div class="sec-hd animate-on-scroll animate-slide-left">
      <h2>Рекомендации</h2>
      <span class="see-all" id="recCount">0</span>
    </div>

    <div id="recommendationsList"></div>

  </div>

  <div style="height: 100px;"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <span class="nav-label">Главная</span>
    </a>
    <a href="upload.html" class="nav-item">
      <div class="nav-icon">📄</div>
      <span class="nav-label">Анализы</span>
    </a>
    <a href="index.html" class="nav-fab" aria-label="Чат">💬</a>
    <a href="calendar.html" class="nav-item">
      <div class="nav-icon">📅</div>
      <span class="nav-label">Календарь</span>
    </a>
    <a href="nutrition.html" class="nav-item">
      <div class="nav-icon">🥗</div>
      <span class="nav-label">Питание</span>
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="database.js"></script>
<script src="animations.js"></script>
<script>
(function(){
  'use strict';

  let latestAnalysis = null;

  window.showToast = function(text, icon = '✓') {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = text;
    toast.querySelector('.toast-icon').textContent = icon;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  };

  // Загрузка последнего анализа
  async function loadLatestAnalysis() {
    try {
      let analyses = [];
      
      // Пробуем Supabase
      if (window.SupabaseDB) {
        const user = await window.SupabaseDB.getCurrentUser();
        if (user) {
          analyses = await window.SupabaseDB.getAnalyses();
        }
      }
      
      // Fallback на localStorage
      if (analyses.length === 0) {
        analyses = JSON.parse(localStorage.getItem('analysis_history_v1') || '[]');
      }
      
      if (analyses.length === 0) {
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('content').style.display = 'none';
        return;
      }
      
      // Сортируем по дате и берём последний
      analyses.sort((a, b) => b.date - a.date);
      latestAnalysis = analyses[0];
      
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      
      generateRecommendations();
    } catch (e) {
      console.error('Ошибка загрузки:', e);
      showToast('Ошибка загрузки данных', '❌');
    }
  }

  // Генерация рекомендаций
  function generateRecommendations() {
    if (!latestAnalysis || !latestAnalysis.results) {
      document.getElementById('emptyState').style.display = 'flex';
      document.getElementById('content').style.display = 'none';
      return;
    }
    
    const results = latestAnalysis.results;
    const recommendations = [];
    
    let normalCount = 0;
    let warningCount = 0;
    let criticalCount = 0;
    
    // Анализируем каждый показатель
    Object.entries(results).forEach(([testName, result]) => {
      if (result.status === 'normal') {
        normalCount++;
        return;
      }
      
      // Ищем рекомендации в supplementMap
      const supplement = window.supplementMap[testName];
      if (supplement && supplement[result.status]) {
        const rec = supplement[result.status];
        recommendations.push({
          testName,
          value: result.value,
          unit: result.unit,
          status: result.status,
          ...rec
        });
        
        if (rec.danger === 'high') criticalCount++;
        else warningCount++;
      } else {
        // Общая рекомендация если нет в карте
        recommendations.push({
          testName,
          value: result.value,
          unit: result.unit,
          status: result.status,
          supplement: 'Консультация врача',
          doctors: ['Терапевт'],
          duration: 'до выяснения причины',
          danger: result.status === 'high' || result.status === 'low' ? 'medium' : 'low',
          description: `Показатель ${result.status === 'high' ? 'повышен' : 'понижен'}`,
          dangerDesc: 'Требуется дополнительная диагностика'
        });
        
        warningCount++;
      }
    });
    
    // Обновляем статистику
    document.getElementById('statNormal').textContent = normalCount;
    document.getElementById('statWarning').textContent = warningCount;
    document.getElementById('statCritical').textContent = criticalCount;
    document.getElementById('recCount').textContent = recommendations.length;
    
    // Сортируем по опасности
    recommendations.sort((a, b) => {
      const dangerOrder = { high: 3, medium: 2, low: 1 };
      return (dangerOrder[b.danger] || 0) - (dangerOrder[a.danger] || 0);
    });
    
    // Рендерим рекомендации
    const list = document.getElementById('recommendationsList');
    list.innerHTML = recommendations.map((rec, idx) => {
      const dangerColors = {
        high: 'var(--red)',
        medium: 'var(--orange)',
        low: 'var(--green)'
      };
      const dangerLabels = {
        high: 'Критично',
        medium: 'Требует внимания',
        low: 'Профилактика'
      };
      
      return `
        <div class="other-card animate-on-scroll animate-fade-up" style="margin-bottom: 12px; border-left: 4px solid ${dangerColors[rec.danger]}; animation-delay: ${idx * 0.05}s;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
            <div style="flex: 1;">
              <div style="font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 4px;">
                ${rec.testName}
              </div>
              <div style="font-size: 14px; color: var(--text-2);">
                ${rec.value} ${rec.unit} (${rec.status === 'high' ? '↑ повышен' : '↓ понижен'})
              </div>
            </div>
            <div style="padding: 4px 12px; background: ${dangerColors[rec.danger]}20; color: ${dangerColors[rec.danger]}; border-radius: var(--r-full); font-size: 12px; font-weight: 600;">
              ${dangerLabels[rec.danger]}
            </div>
          </div>
          
          ${rec.description ? `<div style="font-size: 14px; color: var(--text-2); margin-bottom: 8px; line-height: 1.5;">${rec.description}</div>` : ''}
          ${rec.dangerDesc ? `<div style="font-size: 13px; color: var(--text-3); margin-bottom: 12px; font-style: italic; line-height: 1.5;">${rec.dangerDesc}</div>` : ''}
          
          <div style="padding: 12px; background: var(--surface-2); border-radius: var(--r-sm); margin-bottom: 8px;">
            <div style="font-size: 12px; color: var(--text-3); margin-bottom: 4px;">Что делать:</div>
            <div style="font-size: 14px; color: var(--text-1); font-weight: 600; margin-bottom: 6px;">${rec.supplement}</div>
            <div style="font-size: 12px; color: var(--text-3);">Срок: ${rec.duration}</div>
          </div>
          
          ${rec.doctors && rec.doctors.length > 0 ? `
            <div style="display: flex; gap: 6px; flex-wrap: wrap;">
              ${rec.doctors.map(doc => `<span style="padding: 4px 12px; background: var(--primary-light, #dbeafe); color: var(--primary, #1e5fb8); border-radius: var(--r-full); font-size: 12px; font-weight: 600;">👨‍⚕️ ${doc}</span>`).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }).join('');
  }

  // Обновление рекомендаций
  window.refreshRecommendations = function() {
    showToast('Обновляю рекомендации...', '🔄');
    setTimeout(() => {
      loadLatestAnalysis();
      showToast('Рекомендации обновлены', '✅');
    }, 500);
  };

  // Инициализация
  loadLatestAnalysis();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW:', err));
  }
})();
</script>

</body>
</html>
