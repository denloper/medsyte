<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8BAF8B">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233D8B4E'/><text x='50' y='65' font-size='60' text-anchor='middle'>📊</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
  <title>История анализов</title>
</head>
<body>

<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span id="toastText">Готово</span>
</div>

<div class="app">
  
  <!-- Header -->
  <div class="patient-card fade-in" style="padding: 16px 20px;">
    <div class="pc-top" style="margin-bottom: 0;">
      <div class="pc-identity">
        <a href="index.html" class="circle-btn ripple-element">←</a>
        <div>
          <div class="pc-name">📊 История анализов</div>
          <div class="pc-id" id="historyCount">0 анализов</div>
        </div>
      </div>
      <a href="upload.html" class="circle-btn dark-btn ripple-element" style="text-decoration: none; color: white;">+</a>
    </div>
  </div>

  <!-- Статистика -->
  <div class="sec-hd">
    <h2>Статистика</h2>
  </div>

  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;">
    <div style="background: var(--surface); padding: 16px; border-radius: 14px; box-shadow: 0 2px 8px rgba(28,43,28,0.06); text-align: center;">
      <div style="width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); display: flex; align-items: center; justify-content: center; font-size: 20px; margin: 0 auto 8px;">📊</div>
      <div style="font-size: 24px; font-weight: 800; color: var(--dark);" id="statTotal">0</div>
      <div style="font-size: 11px; color: var(--text-3); margin-top: 2px;">Всего</div>
    </div>
    <div style="background: var(--surface); padding: 16px; border-radius: 14px; box-shadow: 0 2px 8px rgba(28,43,28,0.06); text-align: center;">
      <div style="width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); display: flex; align-items: center; justify-content: center; font-size: 20px; margin: 0 auto 8px;">⚠️</div>
      <div style="font-size: 24px; font-weight: 800; color: var(--dark);" id="statAbnormal">0</div>
      <div style="font-size: 11px; color: var(--text-3); margin-top: 2px;">Отклонений</div>
    </div>
    <div style="background: var(--surface); padding: 16px; border-radius: 14px; box-shadow: 0 2px 8px rgba(28,43,28,0.06); text-align: center;">
      <div style="width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); display: flex; align-items: center; justify-content: center; font-size: 20px; margin: 0 auto 8px;">📅</div>
      <div style="font-size: 14px; font-weight: 800; color: var(--dark); line-height: 1.3;" id="statLastDate">—</div>
      <div style="font-size: 11px; color: var(--text-3); margin-top: 2px;">Последний</div>
    </div>
  </div>

  <!-- Фильтры -->
  <div class="sec-hd">
    <h2>Период</h2>
  </div>

  <div style="display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px;">
    <button class="pill pill-green ripple-element click-scale" data-period="all" onclick="setFilter('all')">Все</button>
    <button class="pill pill-outline ripple-element click-scale" data-period="30" onclick="setFilter('30')">30 дней</button>
    <button class="pill pill-outline ripple-element click-scale" data-period="90" onclick="setFilter('90')">3 месяца</button>
    <button class="pill pill-outline ripple-element click-scale" data-period="365" onclick="setFilter('365')">Год</button>
  </div>

  <!-- Список анализов -->
  <div id="historyList"></div>

  <!-- Пустое состояние -->
  <div id="emptyState" style="display: none; text-align: center; padding: 60px 20px;">
    <div style="font-size: 80px; margin-bottom: 16px;">📊</div>
    <div style="font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 8px;">История пуста</div>
    <div style="font-size: 14px; color: var(--text-2); margin-bottom: 24px; line-height: 1.5;">
      Загрузите первый анализ,<br>чтобы начать отслеживать здоровье
    </div>
    <a href="upload.html" class="next-btn magnetic-btn ripple-element" style="display: inline-block; text-decoration: none;">
      📄 Загрузить анализ
    </a>
  </div>

  <div style="height: 100px;"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <span class="nav-label">Главная</span>
    </a>
    <a href="upload.html" class="nav-item active">
      <div class="nav-icon">📄</div>
      <span class="nav-label">Анализы</span>
    </a>
    <a href="diary.html" class="nav-item">
      <div class="nav-icon">📓</div>
      <span class="nav-label">Дневник</span>
    </a>
    <a href="calendar.html" class="nav-item">
      <div class="nav-icon">📅</div>
      <span class="nav-label">Календарь</span>
    </a>
    <a href="nutrition.html" class="nav-item">
      <div class="nav-icon">🥗</div>
      <span class="nav-label">Питание</span>
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="database.js"></script>
<script src="animations.js"></script>
<script>
(function(){
  'use strict';

  let allAnalyses = [];
  let currentFilter = 'all';

  window.showToast = function(text, icon = '✓') {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = text;
    toast.querySelector('.toast-icon').textContent = icon;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  };

  // Загрузка истории
  async function loadHistory() {
    try {
      // Пробуем Supabase
      if (window.SupabaseDB) {
        const user = await window.SupabaseDB.getCurrentUser();
        if (user) {
          const sbAnalyses = await window.SupabaseDB.getAnalyses();
          if (sbAnalyses && sbAnalyses.length > 0) {
            allAnalyses = sbAnalyses.map(a => ({
              id: a.id,
              fileName: a.file_name,
              date: new Date(a.analysis_date).getTime(),
              results: a.results,
              source: 'cloud'
            }));
          }
        }
      }
      
      // Fallback на localStorage
      if (allAnalyses.length === 0) {
        const localHistory = JSON.parse(localStorage.getItem('analysis_history_v1') || '[]');
        allAnalyses = localHistory.map(h => ({
          id: h.id,
          fileName: h.fileName,
          date: h.date,
          results: h.results || {},
          source: 'local'
        }));
      }
      
      renderHistory();
    } catch (e) {
      console.error('Ошибка загрузки:', e);
      showToast('Ошибка загрузки', '❌');
    }
  }

  // Фильтр
  window.setFilter = function(period) {
    currentFilter = period;
    document.querySelectorAll('[data-period]').forEach(btn => {
      if (btn.dataset.period === period) {
        btn.classList.remove('pill-outline');
        btn.classList.add('pill-green');
      } else {
        btn.classList.remove('pill-green');
        btn.classList.add('pill-outline');
      }
    });
    renderHistory();
  };

  // Рендер списка
  function renderHistory() {
    const list = document.getElementById('historyList');
    const empty = document.getElementById('emptyState');
    
    // Фильтрация
    let filtered = allAnalyses;
    if (currentFilter !== 'all') {
      const days = parseInt(currentFilter);
      const cutoff = Date.now() - (days * 24 * 60 * 60 * 1000);
      filtered = allAnalyses.filter(a => a.date >= cutoff);
    }
    
    // Сортировка
    filtered.sort((a, b) => b.date - a.date);
    
    // Статистика
    document.getElementById('historyCount').textContent = `${filtered.length} анализ${filtered.length === 1 ? '' : filtered.length < 5 ? 'а' : 'ов'}`;
    document.getElementById('statTotal').textContent = allAnalyses.length;
    
    // Отклонения
    let abnormalCount = 0;
    allAnalyses.forEach(a => {
      if (a.results) {
        Object.values(a.results).forEach(r => {
          if (r.status === 'high' || r.status === 'low') abnormalCount++;
        });
      }
    });
    document.getElementById('statAbnormal').textContent = abnormalCount;
    
    // Последний
    if (allAnalyses.length > 0) {
      const last = new Date(allAnalyses[0].date);
      const today = new Date();
      const diffDays = Math.floor((today - last) / (1000 * 60 * 60 * 24));
      let lastText;
      if (diffDays === 0) lastText = 'Сегодня';
      else if (diffDays === 1) lastText = 'Вчера';
      else if (diffDays < 7) lastText = `${diffDays} дн. назад`;
      else lastText = last.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
      document.getElementById('statLastDate').textContent = lastText;
    }
    
    // Пустое состояние
    if (filtered.length === 0) {
      list.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    
    list.style.display = 'block';
    empty.style.display = 'none';
    
    // Группировка по месяцам
    const grouped = {};
    filtered.forEach(a => {
      const d = new Date(a.date);
      const key = d.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(a);
    });
    
    let html = '';
    Object.entries(grouped).forEach(([month, analyses]) => {
      html += `
        <div style="margin-bottom: 20px;">
          <div style="font-size: 12px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-left: 4px;">
            ${month}
          </div>
      `;
      
      analyses.forEach((analysis, idx) => {
        const d = new Date(analysis.date);
        const dateStr = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        const timeStr = d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        
        // Подсчёт показателей
        let total = 0, normal = 0, abnormal = 0;
        if (analysis.results) {
          total = Object.keys(analysis.results).length;
          Object.values(analysis.results).forEach(r => {
            if (r.status === 'normal') normal++;
            else if (r.status === 'high' || r.status === 'low') abnormal++;
          });
        }
        
        const sourceIcon = analysis.source === 'cloud' ? '☁️' : '💾';
        
        html += `
          <div style="background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(28,43,28,0.06);">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
              <div style="flex: 1; min-width: 0;">
                <div style="font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                  ${analysis.fileName || 'Анализ'}
                </div>
                <div style="font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 6px;">
                  <span>${dateStr}</span>
                  <span>•</span>
                  <span>${timeStr}</span>
                  <span>•</span>
                  <span>${sourceIcon}</span>
                </div>
              </div>
              <button onclick="deleteAnalysis('${analysis.id}', '${analysis.source}')" 
                      style="width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--surface-2); color: var(--red); font-size: 14px; cursor: pointer; flex-shrink: 0; margin-left: 8px;">
                🗑
              </button>
            </div>
            
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; background: var(--surface-2); border-radius: 10px; margin-bottom: 12px;">
              <div style="text-align: center;">
                <div style="font-size: 18px; font-weight: 800; color: var(--dark);">${total}</div>
                <div style="font-size: 10px; color: var(--text-3);">Показателей</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 18px; font-weight: 800; color: var(--green);">${normal}</div>
                <div style="font-size: 10px; color: var(--text-3);">В норме</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 18px; font-weight: 800; color: ${abnormal > 0 ? 'var(--red)' : 'var(--text-3)'};">${abnormal}</div>
                <div style="font-size: 10px; color: var(--text-3);">Отклонений</div>
              </div>
            </div>
            
            <button onclick="viewAnalysis('${analysis.id}', '${analysis.source}')" 
                    style="width: 100%; padding: 10px; background: var(--green); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer;">
              👁 Посмотреть результаты
            </button>
          </div>
        `;
      });
      
      html += `</div>`;
    });
    
    list.innerHTML = html;
  }

  // Просмотр анализа
  window.viewAnalysis = async function(id, source) {
    const analysis = allAnalyses.find(a => a.id === id);
    if (!analysis) {
      showToast('Анализ не найден', '❌');
      return;
    }
    
    // Сохраняем в sessionStorage
    sessionStorage.setItem('analysisResults', JSON.stringify({
      results: analysis.results || {},
      patient: analysis.patient || { sex: 'female', age: 35 },
      date: analysis.date,
      fileName: analysis.fileName
    }));
    
    window.location.href = 'results.html';
  };

  // Удаление анализа
  window.deleteAnalysis = async function(id, source) {
    if (!confirm('Удалить этот анализ?')) return;
    
    try {
      // Удаляем из Supabase
      if (source === 'cloud' && window.SupabaseDB) {
        await window.SupabaseDB.deleteAnalysis(id);
      }
      
      // Удаляем из localStorage
      const localHistory = JSON.parse(localStorage.getItem('analysis_history_v1') || '[]');
      const updated = localHistory.filter(h => h.id !== id);
      localStorage.setItem('analysis_history_v1', JSON.stringify(updated));
      
      // Обновляем локальный массив
      allAnalyses = allAnalyses.filter(a => a.id !== id);
      
      renderHistory();
      showToast('Анализ удалён', '🗑');
    } catch (e) {
      console.error('Ошибка удаления:', e);
      showToast('Ошибка: ' + e.message, '❌');
    }
  };

  // Запуск
  loadHistory();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW:', err));
  }
})();
</script>

</body>
</html>
