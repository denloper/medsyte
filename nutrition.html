<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8BAF8B">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233D8B4E'/><text x='50' y='65' font-size='60' text-anchor='middle'>🥗</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
  <title>ИИ План питания</title>
  <style>
    body { padding-bottom: 90px !important; }

    /* ═══ PROGRESS BAR ═══ */
    .progress-wrap {
      background: var(--surface);
      padding: 16px 20px;
      box-shadow: var(--sh-sm);
      margin-bottom: 20px;
    }
    .progress-steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--text-3);
      font-weight: 600;
    }
    .progress-track {
      height: 6px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill-anim {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--green-light));
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* ═══ STEP CARD ═══ */
    .step-card {
      background: var(--surface);
      border-radius: var(--r-xl);
      padding: 24px 20px;
      margin-bottom: 16px;
      box-shadow: var(--sh-md);
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .step-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .step-subtitle {
      font-size: 14px;
      color: var(--text-3);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ═══ OPTION CARDS ═══ */
    .option-grid {
      display: grid;
      gap: 10px;
    }
    .option-grid.cols-2 { grid-template-columns: 1fr 1fr; }

    .opt-card {
      background: var(--surface-2);
      border: 2px solid transparent;
      border-radius: var(--r-md);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      user-select: none;
    }
    .opt-card:hover { border-color: rgba(61,139,78,0.3); }
    .opt-card.selected {
      border-color: var(--green);
      background: rgba(61,139,78,0.08);
    }
    .opt-card-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      background: var(--surface);
    }
    .opt-card.selected .opt-card-icon { background: var(--green); color: white; }
    .opt-card-text { flex: 1; }
    .opt-card-title { font-size: 14px; font-weight: 700; color: var(--dark); margin-bottom: 2px; }
    .opt-card-desc { font-size: 12px; color: var(--text-3); line-height: 1.4; }

    .opt-chip {
      padding: 10px 16px;
      background: var(--surface-2);
      border: 2px solid transparent;
      border-radius: var(--r-full);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .opt-chip:hover { border-color: rgba(61,139,78,0.3); }
    .opt-chip.selected {
      border-color: var(--green);
      background: var(--green);
      color: white;
    }

    /* ═══ NAV BUTTONS ═══ */
    .nav-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .nav-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--r-full);
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .nav-btn.primary {
      background: var(--green);
      color: white;
      box-shadow: 0 4px 12px rgba(61,139,78,0.3);
    }
    .nav-btn.primary:hover:not(:disabled) { background: var(--green-light); transform: translateY(-1px); }
    .nav-btn.primary:disabled { background: #C8DCC8; cursor: not-allowed; box-shadow: none; }
    .nav-btn.secondary {
      background: var(--surface-2);
      color: var(--text-2);
    }
    .nav-btn.secondary:hover { background: var(--surface); }

    /* ═══ RESULT PLAN ═══ */
    .plan-hero {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
      color: white;
      padding: 24px 20px;
      border-radius: var(--r-xl);
      margin-bottom: 16px;
      box-shadow: 0 6px 20px rgba(61,139,78,0.3);
    }
    .plan-hero-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .plan-hero-sub { font-size: 13px; opacity: 0.9; margin-bottom: 16px; }
    .plan-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .plan-stat {
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }
    .plan-stat-value { font-size: 18px; font-weight: 800; }
    .plan-stat-label { font-size: 11px; opacity: 0.9; margin-top: 2px; }

    .day-card {
      background: var(--surface);
      border-radius: var(--r-lg);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--sh-sm);
    }
    .day-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--surface-2);
    }
    .day-title-icon {
      width: 32px; height: 32px;
      background: rgba(61,139,78,0.1);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .meal-row {
      padding: 10px 0;
      border-bottom: 1px dashed var(--surface-2);
    }
    .meal-row:last-child { border-bottom: none; }
    .meal-time {
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .meal-name { font-size: 14px; font-weight: 700; color: var(--dark); margin-bottom: 2px; }
    .meal-desc { font-size: 12px; color: var(--text-3); line-height: 1.4; }
    .meal-kcal { font-size: 11px; color: var(--text-3); margin-top: 4px; }

    .ai-insight {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      padding: 16px;
      border-radius: var(--r-lg);
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.6;
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }
    .ai-insight-title {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .loading-screen {
      text-align: center;
      padding: 60px 20px;
    }
    .loading-icon {
      font-size: 64px;
      margin-bottom: 16px;
      animation: float 2s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .loading-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }
    .loading-sub {
      font-size: 13px;
      color: var(--text-3);
      line-height: 1.5;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span id="toastText">Готово</span>
</div>

<div class="app">

  <!-- HEADER -->
  <div class="patient-card fade-in" style="padding:16px 20px;">
    <div class="pc-top" style="margin-bottom:0;">
      <div class="pc-identity">
        <a href="index.html" class="circle-btn ripple-element">←</a>
        <div>
          <div class="pc-name">🥗 ИИ План питания</div>
          <div class="pc-id">Персональный план на 7 дней</div>
        </div>
      </div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-steps">
      <span id="stepLabel">Шаг 1 из 5</span>
      <span id="stepPercent">20%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill-anim" id="progressFill" style="width:20%;"></div>
    </div>
  </div>

  <!-- STEPS CONTAINER -->
  <div id="stepsContainer"></div>

  <!-- LOADING SCREEN -->
  <div id="loadingScreen" class="hidden">
    <div class="loading-screen">
      <div class="loading-icon">🥗</div>
      <div class="loading-text">ИИ составляет ваш план</div>
      <div class="loading-sub">Анализируем ваши цели, предпочтения<br>и последние анализы...</div>
      <div style="margin-top:24px;">
        <div class="progress-track" style="max-width:280px;margin:0 auto;">
          <div class="progress-fill-anim" id="aiProgressFill" style="width:0%;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="resultContainer" class="hidden"></div>

  <div style="height:100px;"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html" class="nav-item"><div class="nav-icon">🏠</div><span class="nav-label">Главная</span></a>
    <a href="upload.html" class="nav-item"><div class="nav-icon">📄</div><span class="nav-label">Анализы</span></a>
    <a href="chat.html" class="nav-item"><div class="nav-icon">💬</div><span class="nav-label">ИИ-чат</span></a>
    <a href="calendar.html" class="nav-item"><div class="nav-icon">📅</div><span class="nav-label">Календарь</span></a>
    <a href="nutrition.html" class="nav-item active"><div class="nav-icon">🥗</div><span class="nav-label">Питание</span></a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="database.js"></script>
<script src="patient-profile.js"></script>
<script src="ai-assistant.js"></script>
<script>
(function(){
  'use strict';

  const STORAGE_KEY = 'nutrition_plan_v1';
  const TOTAL_STEPS = 5;
  let currentStep = 1;
  let answers = { goal: null, meals: null, likes: [], dislikes: [], style: null };
  let profile = { sex: 'female', age: 35 };
  let lastAbnormal = [];

  // ═══ TOAST ═══
  window.showToast = function(t, i='✓') {
    const el = document.getElementById('toast');
    document.getElementById('toastText').textContent = t;
    el.querySelector('.toast-icon').textContent = i;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  };

  // ═══ LOAD PROFILE & ANALYSES ═══
  function loadProfile() {
    try {
      if (window.PatientProfile && window.PatientProfile.get) {
        const p = window.PatientProfile.get();
        if (p) { profile.sex = p.sex || 'female'; profile.age = p.age || 35; }
      }
    } catch(e) {}

    try {
      const history = JSON.parse(localStorage.getItem('analysis_history_v1') || '[]');
      if (history.length > 0) {
        const last = history[history.length - 1];
        const results = last.results || (last.value && last.value.results);
        if (results) {
          lastAbnormal = Object.entries(results)
            .filter(([_, r]) => r && (r.status === 'high' || r.status === 'low'))
            .slice(0, 5)
            .map(([name, r]) => `${name}: ${r.value} ${r.unit || ''} (${r.status})`);
        }
      }
    } catch(e) {}
  }

  // ═══ STEPS DEFINITION ═══
  const steps = [
    {
      title: '🎯 Ваша цель',
      subtitle: 'Выберите, чего хотите достичь с помощью питания',
      type: 'single',
      field: 'goal',
      options: [
        { value: 'loss', icon: '⬇️', title: 'Похудеть', desc: 'Снизить вес безопасно' },
        { value: 'maintain', icon: '⚖️', title: 'Поддерживать вес', desc: 'Сохранить текущую форму' },
        { value: 'gain', icon: '⬆️', title: 'Набрать массу', desc: 'Мышечная масса' },
        { value: 'health', icon: '💚', title: 'Улучшить здоровье', desc: 'Общее самочувствие' }
      ]
    },
    {
      title: '🍽 Режим питания',
      subtitle: 'Сколько приёмов пищи в день вам комфортно?',
      type: 'single',
      field: 'meals',
      options: [
        { value: '3', icon: '3️⃣', title: '3 раза', desc: 'Завтрак, обед, ужин' },
        { value: '4', icon: '4️⃣', title: '4 раза', desc: '+ перекус' },
        { value: '5', icon: '5️⃣', title: '5 раз', desc: 'Дробное питание' },
        { value: '2', icon: '2️⃣', title: '2 раза', desc: 'Интервальное голодание' }
      ]
    },
    {
      title: '😍 Любимые продукты',
      subtitle: 'Выберите то, что вам нравится (можно несколько)',
      type: 'multi',
      field: 'likes',
      options: ['🥩 Мясо', '🐟 Рыба', '🍗 Птица', '🥦 Овощи', '🍎 Фрукты', '🥛 Молочное', '🌾 Крупы', '🥚 Яйца', '🥜 Орехи', '🫘 Бобовые']
    },
    {
      title: '🚫 Исключить из рациона',
      subtitle: 'Аллергии или нелюбимые продукты',
      type: 'multi',
      field: 'dislikes',
      options: ['🌾 Глютен', '🥛 Лактоза', '🥩 Мясо', '🐟 Рыба', '🥚 Яйца', '🥜 Орехи', '🌶 Острое', '🍬 Сладкое', '🍄 Грибы', '🦐 Морепродукты']
    },
    {
      title: '👨‍🍳 Стиль готовки',
      subtitle: 'Как вы предпочитаете готовить?',
      type: 'single',
      field: 'style',
      options: [
        { value: 'quick', icon: '⚡', title: 'Быстро и просто', desc: 'До 20 минут на блюдо' },
        { value: 'batch', icon: '📦', title: 'Готовлю на 2-3 дня', desc: 'Экономлю время' },
        { value: 'gourmet', icon: '🎨', title: 'Люблю готовить', desc: 'Экспериментирую' },
        { value: 'minimal', icon: '🍳', title: 'Минимум готовки', desc: 'Простые продукты' }
      ]
    }
  ];

  // ═══ RENDER STEP ═══
  function renderStep() {
    const container = document.getElementById('stepsContainer');
    const step = steps[currentStep - 1];
    const percent = Math.round((currentStep / TOTAL_STEPS) * 100);
    document.getElementById('stepLabel').textContent = `Шаг ${currentStep} из ${TOTAL_STEPS}`;
    document.getElementById('stepPercent').textContent = percent + '%';
    document.getElementById('progressFill').style.width = percent + '%';

    let html = `
      <div class="step-card">
        <div class="step-title">${step.title}</div>
        <div class="step-subtitle">${step.subtitle}</div>
    `;

    if (step.type === 'single') {
      html += `<div class="option-grid cols-2">`;
      step.options.forEach(opt => {
        const selected = answers[step.field] === opt.value ? 'selected' : '';
        html += `
          <div class="opt-card ${selected}" data-value="${opt.value}" onclick="selectSingle('${step.field}', '${opt.value}', this)">
            <div class="opt-card-icon">${opt.icon}</div>
            <div class="opt-card-text">
              <div class="opt-card-title">${opt.title}</div>
              <div class="opt-card-desc">${opt.desc}</div>
            </div>
          </div>
        `;
      });
      html += `</div>`;
    } else {
      html += `<div class="option-grid" style="grid-template-columns:1fr 1fr;">`;
      step.options.forEach(opt => {
        const selected = answers[step.field].includes(opt) ? 'selected' : '';
        html += `
          <div class="opt-chip ${selected}" data-value="${opt}" onclick="toggleMulti('${step.field}', '${opt}', this)">
            ${opt}
          </div>
        `;
      });
      html += `</div>`;
    }

    html += `</div>`;

    // NAV BUTTONS
    html += `<div class="nav-row">`;
    if (currentStep > 1) {
      html += `<button class="nav-btn secondary" onclick="prevStep()">← Назад</button>`;
    }
    const isLast = currentStep === TOTAL_STEPS;
    const canProceed = canProceedStep();
    html += `<button class="nav-btn primary" id="nextBtn" onclick="${isLast ? 'generatePlan()' : 'nextStep()'}" ${!canProceed ? 'disabled' : ''}>
      ${isLast ? '🤖 Создать план с ИИ' : 'Далее →'}
    </button>`;
    html += `</div>`;

    container.innerHTML = html;
  }

  function canProceedStep() {
    const step = steps[currentStep - 1];
    if (step.type === 'single') return answers[step.field] !== null;
    return true; // multi может быть пустым
  }

  window.selectSingle = function(field, value, el) {
    answers[field] = value;
    document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('nextBtn').disabled = false;
  };

  window.toggleMulti = function(field, value, el) {
    const idx = answers[field].indexOf(value);
    if (idx === -1) {
      answers[field].push(value);
      el.classList.add('selected');
    } else {
      answers[field].splice(idx, 1);
      el.classList.remove('selected');
    }
  };

  window.nextStep = function() {
    if (currentStep < TOTAL_STEPS) {
      currentStep++;
      renderStep();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  window.prevStep = function() {
    if (currentStep > 1) {
      currentStep--;
      renderStep();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  // ═══ GENERATE PLAN WITH AI ═══
  window.generatePlan = async function() {
    document.getElementById('stepsContainer').classList.add('hidden');
    document.getElementById('progressWrap').classList.add('hidden');
    document.getElementById('loadingScreen').classList.remove('hidden');

    // Анимация прогресса
    const fill = document.getElementById('aiProgressFill');
    let progress = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 8;
      if (progress > 90) progress = 90;
      fill.style.width = progress + '%';
    }, 300);

    try {
      const goalMap = { loss: 'похудение', maintain: 'поддержание веса', gain: 'набор массы', health: 'улучшение здоровья' };
      const styleMap = { quick: 'быстро и просто', batch: 'на 2-3 дня', gourmet: 'разнообразно', minimal: 'минимум готовки' };

      let prompt = `Ты — профессиональный диетолог-нутрициолог. Составь ПЕРСОНАЛЬНЫЙ план питания на 7 дней.

ПАЦИЕНТ:
- Пол: ${profile.sex === 'male' ? 'мужчина' : 'женщина'}
- Возраст: ${profile.age} лет
- Цель: ${goalMap[answers.goal] || answers.goal}
- Приёмов пищи в день: ${answers.meals}
- Любимые продукты: ${answers.likes.join(', ') || 'не указаны'}
- Исключить: ${answers.dislikes.join(', ') || 'нет'}
- Стиль готовки: ${styleMap[answers.style] || answers.style}`;

      if (lastAbnormal.length > 0) {
        prompt += `\n\nОТКЛОНЕНИЯ В ПОСЛЕДНИХ АНАЛИЗАХ (учти это!):
${lastAbnormal.join('\n')}

Подбери продукты, которые помогут скорректировать эти отклонения.`;
      }

      prompt += `

ФОРМАТ ОТВЕТА — СТРОГО JSON без markdown обёрток:
{
  "dailyCalories": число,
  "protein": число в граммах,
  "fat": число в граммах,
  "carbs": число в граммах,
  "aiInsight": "2-3 предложения персонального совета с учётом анализов и цели",
  "days": [
    {
      "day": "Понедельник",
      "meals": [
        { "time": "Завтрак", "name": "название блюда", "desc": "состав и порция", "kcal": число },
        { "time": "Обед", "name": "...", "desc": "...", "kcal": число },
        { "time": "Ужин", "name": "...", "desc": "...", "kcal": число }
      ]
    }
    ... и так 7 дней
  ]
}

ВАЖНО:
- Все 7 дней (Понедельник-Воскресенье)
- Разнообразные блюда, не повторяй одно и то же
- Учитывай калорийность: ${answers.goal === 'loss' ? '1500-1800' : answers.goal === 'gain' ? '2500-3000' : '2000-2300'} ккал/день
- Учитывай исключения и предпочтения
- В aiInsight дай конкретный совет на основе отклонений в анализах (если есть)
- Блюда реалистичные, простые в приготовлении
- Возвращай ТОЛЬКО валидный JSON без пояснений`;

      const result = await window.AIAssistant.sendMessage(prompt);
      const reply = result?.reply || '';

      // Парсим JSON из ответа
      let plan = null;
      try {
        let jsonStr = reply.trim();
        if (jsonStr.startsWith('```json')) jsonStr = jsonStr.replace(/^```json\s*/, '').replace(/\s*```$/, '');
        else if (jsonStr.startsWith('```')) jsonStr = jsonStr.replace(/^```\s*/, '').replace(/\s*```$/, '');
        const match = jsonStr.match(/\{[\s\S]*\}/);
        if (match) plan = JSON.parse(match[0]);
      } catch(e) {
        console.error('JSON parse error:', e);
        throw new Error('ИИ вернул некорректный формат');
      }

      if (!plan || !plan.days || !Array.isArray(plan.days)) {
        throw new Error('Не удалось создать план');
      }

      clearInterval(interval);
      fill.style.width = '100%';

      // Сохраняем план
      const planData = { answers, profile, plan, createdAt: Date.now() };
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(planData)); } catch(e) {}

      setTimeout(() => renderPlan(planData), 400);

    } catch(err) {
      clearInterval(interval);
      console.error(err);
      showToast('Ошибка: ' + err.message, '❌');
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('stepsContainer').classList.remove('hidden');
      document.getElementById('progressWrap').classList.remove('hidden');
    }
  };

  // ═══ RENDER RESULT ═══
  function renderPlan(planData) {
    const { plan, answers, profile } = planData;
    document.getElementById('loadingScreen').classList.add('hidden');
    const container = document.getElementById('resultContainer');
    container.classList.remove('hidden');

    const goalMap = { loss: 'Похудение', maintain: 'Поддержание', gain: 'Набор массы', health: 'Здоровье' };

    let html = `
      <div class="plan-hero">
        <div class="plan-hero-title">Ваш персональный план</div>
        <div class="plan-hero-sub">${goalMap[answers.goal]} • ${answers.meals} приёмов пищи • 7 дней</div>
        <div class="plan-stats">
          <div class="plan-stat">
            <div class="plan-stat-value">${plan.dailyCalories}</div>
            <div class="plan-stat-label">ккал/день</div>
          </div>
          <div class="plan-stat">
            <div class="plan-stat-value">${plan.protein}г</div>
            <div class="plan-stat-label">белки</div>
          </div>
          <div class="plan-stat">
            <div class="plan-stat-value">${plan.fat}г</div>
            <div class="plan-stat-label">жиры</div>
          </div>
        </div>
      </div>
    `;

    if (plan.aiInsight) {
      html += `
        <div class="ai-insight">
          <div class="ai-insight-title">🤖 Совет от ИИ-нутрициолога</div>
          ${plan.aiInsight}
        </div>
      `;
    }

    const dayIcons = { 'Понедельник': '🌱', 'Вторник': '🌿', 'Среда': '🍀', 'Четверг': '🌾', 'Пятница': '🌻', 'Суббота': '🌸', 'Воскресенье': '🌺' };

    plan.days.forEach(day => {
      html += `
        <div class="day-card">
          <div class="day-title">
            <div class="day-title-icon">${dayIcons[day.day] || '📅'}</div>
            ${day.day}
          </div>
      `;
      day.meals.forEach(meal => {
        html += `
          <div class="meal-row">
            <div class="meal-time">${meal.time}</div>
            <div class="meal-name">${meal.name}</div>
            <div class="meal-desc">${meal.desc}</div>
            ${meal.kcal ? `<div class="meal-kcal">🔥 ${meal.kcal} ккал</div>` : ''}
          </div>
        `;
      });
      html += `</div>`;
    });

    html += `
      <div class="nav-row" style="margin-top:16px;">
        <button class="nav-btn secondary" onclick="regeneratePlan()">🔄 Перегенерировать</button>
        <button class="nav-btn primary" onclick="saveAndExit()">💾 Сохранить</button>
      </div>
      <button class="nav-btn secondary" onclick="startOver()" style="margin-top:8px;width:100%;">🔁 Пройти опрос заново</button>
    `;

    container.innerHTML = html;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  window.regeneratePlan = async function() {
    document.getElementById('resultContainer').classList.add('hidden');
    document.getElementById('loadingScreen').classList.remove('hidden');
    await generatePlan();
  };

  window.saveAndExit = function() {
    showToast('План сохранён!', '✅');
    setTimeout(() => { window.location.href = 'index.html'; }, 800);
  };

  window.startOver = function() {
    if (!confirm('Начать опрос заново? Текущий план будет потерян.')) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    answers = { goal: null, meals: null, likes: [], dislikes: [], style: null };
    currentStep = 1;
    document.getElementById('resultContainer').classList.add('hidden');
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('progressWrap').classList.remove('hidden');
    document.getElementById('stepsContainer').classList.remove('hidden');
    renderStep();
  };

  // ═══ INIT ═══
  loadProfile();

  // Восстановление сохранённого плана
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      if (data.plan && data.plan.days) {
        const hoursPassed = (Date.now() - data.createdAt) / (1000 * 60 * 60);
        if (hoursPassed < 24 * 7) { // показываем план не старше 7 дней
          renderPlan(data);
          return;
        }
      }
    }
  } catch(e) {}

  renderStep();

})();
</script>
</body>
</html>
