<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8BAF8B">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233D8B4E'/><text x='50' y='65' font-size='60' text-anchor='middle'>🩺</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <title>Дневник здоровья</title>
</head>
<body>

<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span id="toastText">Готово</span>
</div>

<div class="app">
  
  <div class="status-bar animate-on-scroll animate-fade-in">
    <span id="currentTime">9:41</span>
    <div class="status-icons">
      <span>📶</span>
      <span>📡</span>
      <span class="pulse-dot">🔋</span>
    </div>
  </div>

  <!-- Header -->
  <div class="patient-card animate-on-scroll animate-fade-up" style="padding: 16px 20px;">
    <div class="pc-top" style="margin-bottom: 0;">
      <div class="pc-identity">
        <a href="index.html" class="circle-btn ripple-element">←</a>
        <div>
          <div class="pc-name">Дневник здоровья</div>
          <div class="pc-id" id="totalEntries">0 записей</div>
        </div>
      </div>
      <button class="circle-btn dark-btn ripple-element" onclick="exportAll()">⬇</button>
    </div>
  </div>

  <!-- Overall stats -->
  <div class="sec-hd animate-on-scroll animate-slide-left">
    <h2>Общая статистика</h2>
  </div>

  <div class="vitals-grid stagger" id="overallStats">
    <div class="v-card tilt-card ripple-element">
      <div class="v-icon green">📝</div>
      <div class="v-label">Записей</div>
      <div class="v-value"><span id="statEntries" data-counter="0">0</span></div>
    </div>
    <div class="v-card tilt-card ripple-element">
      <div class="v-icon blue">📊</div>
      <div class="v-label">Метрик</div>
      <div class="v-value"><span id="statMetrics" data-counter="0">0</span></div>
    </div>
    <div class="v-card tilt-card ripple-element">
      <div class="v-icon amber">🔥</div>
      <div class="v-label">Серия дней</div>
      <div class="v-value"><span id="statStreak" data-counter="0">0</span></div>
    </div>
    <div class="v-card tilt-card ripple-element">
      <div class="v-icon red">⏱</div>
      <div class="v-label">Последняя</div>
      <div class="v-value" style="font-size: 20px;"><span id="statLast">—</span></div>
    </div>
  </div>

  <!-- Metrics tabs -->
  <div class="sec-hd animate-on-scroll animate-slide-left">
    <h2>Показатели</h2>
  </div>

  <div class="filter-row animate-on-scroll animate-fade-in" id="metricTabs">
    <button class="filter-chip active ripple-element click-scale" data-metric="blood_pressure">🩸 Давление</button>
    <button class="filter-chip ripple-element click-scale" data-metric="glucose">🍬 Сахар</button>
    <button class="filter-chip ripple-element click-scale" data-metric="weight">⚖️ Вес</button>
    <button class="filter-chip ripple-element click-scale" data-metric="sleep">😴 Сон</button>
    <button class="filter-chip ripple-element click-scale" data-metric="temperature">🌡 Температура</button>
  </div>

  <!-- Add entry button -->
  <button class="next-btn magnetic-btn ripple-element animate-on-scroll animate-fade-up" onclick="openAddModal()">
    + Добавить запись
  </button>

  <!-- Current metric content -->
  <div id="metricContent"></div>

  <div style="height: 100px;"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <span class="nav-label">Главная</span>
    </a>
    <a href="upload.html" class="nav-item">
      <div class="nav-icon">📄</div>
      <span class="nav-label">Анализы</span>
    </a>
    <a href="index.html" class="nav-fab">🩺</a>
    <a href="calendar.html" class="nav-item">
      <div class="nav-icon">📅</div>
      <span class="nav-label">Календарь</span>
    </a>
    <a href="diary.html" class="nav-item active">
      <div class="nav-icon">📓</div>
      <span class="nav-label">Дневник</span>
    </a>
  </div>
</div>

<!-- Add Entry Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Новая запись</div>
      <button class="modal-close ripple-element" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="diary-engine.js"></script>
<script src="animations.js"></script>
<script>
(function(){
  'use strict';

  let currentMetric = 'blood_pressure';
  let currentPeriod = 30;
  let chartInstance = null;
  let ratings = {};

  function updateTime() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('currentTime').textContent = `${h}:${m}`;
  }
  updateTime();
  setInterval(updateTime, 60000);

  window.showToast = function(text, icon = '✓') {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = text;
    toast.querySelector('.toast-icon').textContent = icon;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  };

  // Tabs
  document.querySelectorAll('#metricTabs .filter-chip').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#metricTabs .filter-chip').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentMetric = this.dataset.metric;
      renderMetricContent();
    });
  });

  function renderOverallStats() {
    const stats = window.DiaryEngine ? window.DiaryEngine.getOverallStats() : { totalEntries: 0, activeMetrics: 0, streak: 0, lastEntryDate: 0 };
    
    document.getElementById('totalEntries').textContent = `${stats.totalEntries} записей`;
    document.getElementById('statEntries').dataset.counter = stats.totalEntries;
    document.getElementById('statMetrics').dataset.counter = stats.activeMetrics;
    document.getElementById('statStreak').dataset.counter = stats.streak;
    
    const daysSince = stats.lastEntryDate > 0 ? Math.floor((Date.now() - stats.lastEntryDate) / (24 * 60 * 60 * 1000)) : '—';
    document.getElementById('statLast').textContent = daysSince;

    setTimeout(() => {
      if (window.AnimationsEngine) {
        ['statEntries', 'statMetrics', 'statStreak'].forEach(id => {
          const el = document.getElementById(id);
          window.AnimationsEngine.animateCounter(el, parseInt(el.dataset.counter), 1000);
        });
      }
    }, 300);
  }

  function renderMetricContent() {
    if (!window.DiaryEngine) return;
    
    const metric = window.DiaryEngine.metrics[currentMetric];
    if (!metric) return;

    const stats = window.DiaryEngine.getStats(currentMetric, currentPeriod);
    const chartData = window.DiaryEngine.getChartData(currentMetric, currentPeriod);
    const entries = window.DiaryEngine.getEntries(currentMetric).slice().reverse().slice(0, 20);

    let html = '';

    // Stats
    html += `
      <div class="sec-hd animate-on-scroll animate-slide-left">
        <h2>Статистика за ${currentPeriod} дней</h2>
      </div>
      <div class="vitals-grid stagger">
        <div class="v-card tilt-card ripple-element">
          <div class="v-icon blue">📊</div>
          <div class="v-label">Записей</div>
          <div class="v-value"><span data-counter="${stats.count}">${stats.count}</span></div>
        </div>
        <div class="v-card tilt-card ripple-element">
          <div class="v-icon green">⌀</div>
          <div class="v-label">Среднее</div>
          <div class="v-value" style="font-size: 22px;">${stats.avg !== null ? stats.avg.toFixed(1) : '—'}</div>
        </div>
        <div class="v-card tilt-card ripple-element">
          <div class="v-icon amber">↓</div>
          <div class="v-label">Мин</div>
          <div class="v-value" style="font-size: 22px;">${stats.min ?? '—'}</div>
        </div>
        <div class="v-card tilt-card ripple-element">
          <div class="v-icon red">↑</div>
          <div class="v-label">Макс</div>
          <div class="v-value" style="font-size: 22px;">${stats.max ?? '—'}</div>
        </div>
      </div>
    `;

    // Latest interpretation
    if (stats.latest) {
      const interp = metric.interpret(stats.latest, window.DiaryEngine.getProfile());
      const cls = interp.status === 'normal' ? 'ok' : interp.status === 'warn' ? 'warn' : 'danger';
      html += `
        <div class="other-card animate-on-scroll animate-fade-up" style="border-left: 4px solid var(--${cls === 'ok' ? 'green' : cls === 'warn' ? 'orange' : 'red'});">
          <div style="font-weight: 700; color: var(--dark); margin-bottom: 6px;">Последняя запись: ${interp.label}</div>
          ${interp.advice ? `<div style="font-size: 14px; color: var(--text-2); line-height: 1.5;">${interp.advice}</div>` : ''}
        </div>
      `;
    }

    // Chart
    html += `
      <div class="sleep-card animate-on-scroll animate-fade-up">
        <div class="sc-head">
          <div class="sc-left">
            <div class="sc-icon float-slow">${metric.icon}</div>
            <div class="sc-title">Динамика</div>
          </div>
          <div class="pc-pills" style="gap: 4px;">
            <button class="pill ${currentPeriod === 7 ? 'pill-green' : 'pill-outline'} ripple-element click-scale" onclick="setPeriod(7)">7д</button>
            <button class="pill ${currentPeriod === 30 ? 'pill-green' : 'pill-outline'} ripple-element click-scale" onclick="setPeriod(30)">30д</button>
            <button class="pill ${currentPeriod === 90 ? 'pill-green' : 'pill-outline'} ripple-element click-scale" onclick="setPeriod(90)">3м</button>
          </div>
        </div>
        <div style="height: 200px; position: relative;">
          <canvas id="metricChart"></canvas>
        </div>
      </div>
    `;

    // History
    html += `
      <div class="sec-hd animate-on-scroll animate-slide-left">
        <h2>История</h2>
        <button class="see-all ripple-element click-scale" onclick="exportMetric()">📥 CSV</button>
      </div>
    `;

    if (entries.length === 0) {
      html += `
        <div class="empty-state animate-on-scroll animate-fade-up">
          <div class="empty-icon">📭</div>
          <div class="empty-title">Записей пока нет</div>
          <div class="empty-sub">Добавьте первую запись</div>
        </div>
      `;
    } else {
      html += '<div class="other-card animate-on-scroll animate-fade-up">';
      entries.forEach((e, idx) => {
        const interp = metric.interpret(e, window.DiaryEngine.getProfile());
        const cls = interp.status === 'normal' ? 'ok' : interp.status === 'warn' ? 'warn' : 'danger';
        const bgColor = cls === 'ok' ? 'green-bg' : cls === 'warn' ? 'amber-bg' : 'red-bg';
        const d = new Date(e.date);
        const dateStr = d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        
        let valuesHtml = '';
        metric.fields.forEach(f => {
          if (e[f.id] === undefined || e[f.id] === '' || e[f.id] === 0) return;
          if (f.type === 'rating') {
            valuesHtml += `<span>${'★'.repeat(e[f.id])}${'☆'.repeat((f.max || 5) - e[f.id])}</span>`;
          } else {
            valuesHtml += `<span><strong>${e[f.id]}</strong>${f.unit ? ' ' + f.unit : ''}</span>`;
          }
        });
        
        html += `
          <div class="metric-row ripple-element" style="animation: fadeInUp 0.4s ease ${idx * 0.04}s backwards;">
            <div class="mr-circle ${bgColor}">${metric.icon}</div>
            <div class="mr-info">
              <div class="mr-label">${dateStr}</div>
              <div class="mr-value" style="font-size: 15px; display: flex; gap: 6px; flex-wrap: wrap;">${valuesHtml}</div>
              <div style="font-size: 11px; color: var(--text-3); margin-top: 2px;">${interp.label}</div>
            </div>
            <button class="circle-btn ripple-element" onclick="deleteEntry('${e.id}')" style="width: 32px; height: 32px; font-size: 14px;">🗑</button>
          </div>
        `;
      });
      html += '</div>';
    }

    document.getElementById('metricContent').innerHTML = html;
    renderChart(chartData);

    // Счётчики
    setTimeout(() => {
      document.querySelectorAll('#metricContent [data-counter]').forEach(el => {
        if (window.AnimationsEngine) {
          window.AnimationsEngine.animateCounter(el, parseInt(el.dataset.counter), 800);
        }
      });
    }, 200);
  }

  window.setPeriod = function(days) {
    currentPeriod = days;
    renderMetricContent();
  };

  function renderChart(chartData) {
    if (chartInstance) {
      chartInstance.destroy();
      chartInstance = null;
    }
    
    const canvas = document.getElementById('metricChart');
    if (!canvas || !chartData || chartData.entries.length === 0) return;

    const ctx = canvas.getContext('2d');
    const metric = window.DiaryEngine.metrics[currentMetric];
    const field = metric.fields.find(f => f.id === metric.primaryValue);
    const unit = field ? field.unit || '' : '';

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartData.labels,
        datasets: [{
          label: metric.title,
          data: chartData.data,
          borderColor: '#3D8B4E',
          backgroundColor: 'rgba(61, 139, 78, 0.1)',
          pointBackgroundColor: chartData.colors,
          pointBorderColor: chartData.colors,
          pointRadius: 5,
          pointHoverRadius: 7,
          tension: 0.3,
          fill: true,
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1C2B1C',
            titleColor: '#fff',
            bodyColor: '#fff',
            padding: 12,
            callbacks: {
              title: function(items) {
                const idx = items[0].dataIndex;
                const entry = chartData.entries[idx];
                const d = new Date(entry.date);
                return d.toLocaleDateString('ru-RU');
              },
              label: function(context) {
                const idx = context.dataIndex;
                const entry = chartData.entries[idx];
                const interp = metric.interpret(entry, window.DiaryEngine.getProfile());
                return [
                  `${metric.title}: ${context.raw} ${unit}`,
                  `Статус: ${interp.label}`
                ];
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: { color: '#64748b', maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }
          },
          y: {
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: { color: '#64748b', callback: v => v + ' ' + unit }
          }
        }
      }
    });
  }

  window.openAddModal = function() {
    const metric = window.DiaryEngine.metrics[currentMetric];
    if (!metric) return;

    document.getElementById('modalTitle').textContent = `+ ${metric.title}`;
    
    let html = '';
    metric.fields.forEach(f => {
      html += `<div style="margin-bottom: 14px;">
        <label style="font-size: 12px; color: var(--text-3); display: block; margin-bottom: 6px;">${f.label}${f.unit ? ` (${f.unit})` : ''}</label>`;
      
      if (f.type === 'number') {
        html += `<input type="number" data-field="${f.id}" 
                 ${f.min !== undefined ? `min="${f.min}"` : ''}
                 ${f.max !== undefined ? `max="${f.max}"` : ''}
                 ${f.step ? `step="${f.step}"` : 'step="1"'}
                 ${f.required ? 'required' : ''}
                 ${f.placeholder ? `placeholder="${f.placeholder}"` : ''}
                 style="width: 100%; padding: 12px 14px; border: 1.5px solid #C8DCC8; border-radius: var(--r-sm); font-family: inherit; font-size: 15px; background: var(--surface-2);">`;
      } else if (f.type === 'select') {
        html += `<select data-field="${f.id}" ${f.required ? 'required' : ''}
                 style="width: 100%; padding: 12px 14px; border: 1.5px solid #C8DCC8; border-radius: var(--r-sm); font-family: inherit; font-size: 15px; background: var(--surface-2);">
                 <option value="">— выберите —</option>
                 ${f.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                 </select>`;
      } else if (f.type === 'rating') {
        ratings[f.id] = 0;
        html += `<div class="rating-input" data-field="${f.id}" style="display: flex; gap: 4px;">`;
        for (let i = 1; i <= (f.max || 5); i++) {
          html += `<button type="button" class="rating-star ripple-element" data-value="${i}" 
                   onclick="setRating('${f.id}', ${i})"
                   style="font-size: 28px; background: none; border: none; cursor: pointer; color: #D4E8D4; padding: 0;">★</button>`;
        }
        html += '</div>';
      }
      html += '</div>';
    });

    html += `<button class="next-btn magnetic-btn ripple-element" onclick="submitEntry()">✓ Сохранить</button>`;
    
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('addModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.setRating = function(fieldId, value) {
    ratings[fieldId] = value;
    const container = document.querySelector(`[data-field="${fieldId}"]`);
    if (container) {
      container.querySelectorAll('.rating-star').forEach(s => {
        s.style.color = parseInt(s.dataset.value) <= value ? '#F4A261' : '#D4E8D4';
      });
    }
  };

  window.closeAddModal = function() {
    document.getElementById('addModal').classList.remove('open');
    document.body.style.overflow = '';
  };

  window.submitEntry = function() {
    const metric = window.DiaryEngine.metrics[currentMetric];
    const entry = {};
    let valid = true;

    metric.fields.forEach(f => {
      const el = document.querySelector(`[data-field="${f.id}"]`);
      if (!el) return;

      let value;
      if (f.type === 'number') {
        value = parseFloat(el.value);
        if (isNaN(value)) value = null;
      } else if (f.type === 'rating') {
        value = ratings[f.id] || 0;
      } else {
        value = el.value;
      }

      if (f.required && (value === null || value === '' || value === 0)) {
        valid = false;
      }
      entry[f.id] = value;
    });

    if (!valid) {
      showToast('Заполните все поля', '⚠️');
      return;
    }

    window.DiaryEngine.addEntry(currentMetric, entry);
    closeAddModal();
    renderMetricContent();
    renderOverallStats();
    showToast('Запись добавлена', '✓');
  };

  window.deleteEntry = function(entryId) {
    if (confirm('Удалить эту запись?')) {
      window.DiaryEngine.deleteEntry(currentMetric, entryId);
      renderMetricContent();
      renderOverallStats();
      showToast('Запись удалена', '🗑');
    }
  };

  window.exportMetric = function() {
    const csv = window.DiaryEngine.exportToCSV(currentMetric);
    if (!csv) {
      showToast('Нет данных', '⚠️');
      return;
    }
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${currentMetric}_${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Экспортировано', '📥');
  };

  window.exportAll = function() {
    const text = window.DiaryEngine.exportAllForDoctor();
    if (!text || text.split('\n').length < 10) {
      showToast('Нет данных', '⚠️');
      return;
    }
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `diary_${new Date().toISOString().slice(0, 10)}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Экспортировано', '📥');
  };

  // Init
  renderOverallStats();
  renderMetricContent();

  document.getElementById('addModal').addEventListener('click', (e) => {
    if (e.target.id === 'addModal') closeAddModal();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW:', err));
  }
})();
</script>

</body>
</html>
