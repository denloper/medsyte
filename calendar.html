<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<base href="./">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#2563EB">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563EB'/><text x='50' y='65' font-size='60' text-anchor='middle'>🩺</text></svg>">
<title>Календарь здоровья — Семейный доктор</title>
<style>
:root{--c-primary:#2563EB;--c-primary-dark:#1E40AF;--c-primary-light:#DBEAFE;--c-ok:#059669;--c-ok-bg:#ECFDF5;--c-warn:#D97706;--c-warn-bg:#FFFBEB;--c-danger:#B91C1C;--c-danger-bg:#FEF2F2;--c-bg:#F9FAFB;--c-card:#FFFFFF;--c-border:#E5E7EB;--c-text:#111827;--c-text-muted:#6B7280;--fs-base:18px;--fs-lg:20px;--fs-xl:24px;--fs-2xl:28px;--sp-1:8px;--sp-2:16px;--sp-3:24px;--sp-4:32px;--r-sm:8px;--r-md:12px;--r-lg:16px;--shadow-sm:0 1px 2px rgba(0,0,0,0.05);--shadow-md:0 4px 12px rgba(0,0,0,0.08);--focus-ring:0 0 0 4px rgba(37,99,235,0.3)}
*{box-sizing:border-box;margin:0;padding:0}html{font-size:var(--fs-base)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:var(--sp-3)}
header{background:var(--c-card);border-bottom:1px solid var(--c-border);padding:var(--sp-3);margin-bottom:var(--sp-3);box-shadow:var(--shadow-sm)}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:var(--sp-2);flex-wrap:wrap}
.back-link{text-decoration:none;color:var(--c-primary);font-size:var(--fs-base);padding:8px 12px;border-radius:var(--r-sm);display:inline-flex;align-items:center;gap:8px;font-weight:600}
.back-link:hover{background:var(--c-primary-light)}
h1{font-size:var(--fs-2xl);color:var(--c-primary-dark)}
.subtitle{color:var(--c-text-muted);margin:var(--sp-1) 0 var(--sp-3)}

/* Сводка */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:var(--sp-2);margin-bottom:var(--sp-3)}
.stat-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--r-md);padding:var(--sp-2) var(--sp-3);text-align:center}
.stat-card h3{font-size:14px;color:var(--c-text-muted);margin-bottom:6px;font-weight:600}
.stat-card .number{font-size:var(--fs-2xl);font-weight:700;display:block;margin-bottom:4px}
.stat-card.overdue{background:var(--c-danger-bg);color:var(--c-danger);border-color:var(--c-danger)}
.stat-card.urgent{background:#FEF3C7;color:#92400E;border-color:#F59E0B}
.stat-card.soon{background:var(--c-warn-bg);color:var(--c-warn);border-color:var(--c-warn)}
.stat-card.completed{background:var(--c-ok-bg);color:var(--c-ok);border-color:var(--c-ok)}

/* Профиль пациента */
.patient-bar{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--r-md);padding:var(--sp-2) var(--sp-3);margin-bottom:var(--sp-3);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--sp-2)}
.patient-info{display:flex;gap:var(--sp-2);align-items:center;flex-wrap:wrap}
.patient-info strong{color:var(--c-primary-dark)}
.notif-btn{padding:10px 16px;background:var(--c-primary);color:white;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;min-height:44px;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.notif-btn.granted{background:var(--c-ok)}
.notif-btn.denied{background:var(--c-text-muted);cursor:not-allowed}

/* Фильтры */
.filters{display:flex;gap:var(--sp-1);margin-bottom:var(--sp-3);flex-wrap:wrap}
.filter-btn{padding:8px 14px;font-size:14px;font-weight:600;border:2px solid var(--c-border);background:var(--c-card);color:var(--c-text);border-radius:20px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.filter-btn:hover{border-color:var(--c-primary)}
.filter-btn.active{background:var(--c-primary);color:white;border-color:var(--c-primary)}

/* Категории */
.category-section{margin-bottom:var(--sp-4)}
.category-title{font-size:var(--fs-lg);color:var(--c-primary-dark);margin-bottom:var(--sp-2);padding-bottom:var(--sp-1);border-bottom:2px solid var(--c-primary-light);display:flex;align-items:center;gap:8px}

/* Карточка события */
.event-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--r-md);padding:var(--sp-2) var(--sp-3);margin-bottom:var(--sp-2);border-left:4px solid var(--c-border);transition:all 0.2s}
.event-card:hover{box-shadow:var(--shadow-md)}
.event-card.overdue{border-left-color:var(--c-danger);background:var(--c-danger-bg)}
.event-card.urgent{border-left-color:#F59E0B;background:#FEF3C7}
.event-card.soon{border-left-color:var(--c-warn);background:var(--c-warn-bg)}
.event-card.upcoming{border-left-color:var(--c-primary);background:var(--c-primary-light)}
.event-card.planned{border-left-color:var(--c-text-muted)}
.event-card.completed{border-left-color:var(--c-ok);background:var(--c-ok-bg);opacity:0.75}

.event-header{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--sp-2);margin-bottom:var(--sp-1)}
.event-title{font-size:var(--fs-lg);font-weight:700;display:flex;align-items:center;gap:8px;flex:1}
.event-title .icon{font-size:24px}
.event-badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;white-space:nowrap}
.event-badge.overdue{background:var(--c-danger);color:white}
.event-badge.urgent{background:#F59E0B;color:white}
.event-badge.soon{background:var(--c-warn);color:white}
.event-badge.upcoming{background:var(--c-primary);color:white}
.event-badge.planned{background:var(--c-text-muted);color:white}
.event-badge.completed{background:var(--c-ok);color:white}

.event-description{color:var(--c-text-muted);font-size:15px;margin-bottom:var(--sp-1)}
.event-meta{display:flex;gap:var(--sp-3);flex-wrap:wrap;font-size:14px;color:var(--c-text-muted);margin-bottom:var(--sp-2)}
.event-meta strong{color:var(--c-text)}

.event-actions{display:flex;gap:var(--sp-1);flex-wrap:wrap;margin-top:var(--sp-2)}
.btn{padding:10px 16px;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:40px;transition:all 0.2s}
.btn-primary{background:var(--c-ok);color:white}
.btn-primary:hover{background:#047857}
.btn-secondary{background:var(--c-card);color:var(--c-primary);border:2px solid var(--c-primary)}
.btn-secondary:hover{background:var(--c-primary-light)}
.btn-tertiary{background:transparent;color:var(--c-text-muted)}
.btn-tertiary:hover{background:var(--c-bg);color:var(--c-text)}
.btn-danger{background:var(--c-danger);color:white}

/* Пустое состояние */
.empty-state{text-align:center;padding:var(--sp-4);background:var(--c-card);border-radius:var(--r-md);border:1px solid var(--c-border)}
.empty-state .icon{font-size:64px;margin-bottom:var(--sp-2)}
.empty-state h2{margin-bottom:var(--sp-2);color:var(--c-primary-dark)}
.empty-state p{margin-bottom:var(--sp-3);color:var(--c-text-muted)}

/* Модальное окно планирования */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:1000;padding:var(--sp-3)}
.modal-overlay.active{display:flex}
.modal{background:var(--c-card);border-radius:var(--r-lg);max-width:480px;width:100%;padding:var(--sp-4);box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal h2{color:var(--c-primary-dark);font-size:var(--fs-xl);margin-bottom:var(--sp-2)}
.modal p{color:var(--c-text-muted);margin-bottom:var(--sp-3)}
.modal label{display:block;margin-bottom:6px;font-weight:600;color:var(--c-text)}
.modal input[type=date]{width:100%;padding:12px;font-size:var(--fs-base);border:1px solid var(--c-border);border-radius:var(--r-sm);background:var(--c-bg);color:var(--c-text);margin-bottom:var(--sp-2);font-family:inherit}
.modal-buttons{display:flex;gap:var(--sp-2);flex-wrap:wrap;margin-top:var(--sp-2)}
.modal-buttons .btn{flex:1;min-width:120px}

.quick-dates{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-1);margin-bottom:var(--sp-2)}
.quick-date-btn{padding:10px;background:var(--c-bg);border:2px solid var(--c-border);border-radius:var(--r-sm);cursor:pointer;text-align:center;font-size:13px;font-weight:600;font-family:inherit;color:var(--c-text);transition:all 0.2s}
.quick-date-btn:hover{border-color:var(--c-primary);background:var(--c-primary-light)}

.disclaimer{background:#FEF3C7;border:1px solid #FDE68A;border-radius:var(--r-md);padding:var(--sp-3);text-align:center;color:#92400E;font-size:14px;margin-top:var(--sp-3)}

@media(prefers-color-scheme:dark){
  :root{--c-bg:#111827;--c-card:#1F2937;--c-border:#374151;--c-text:#F9FAFB;--c-text-muted:#9CA3AF;--c-primary-light:#1E3A8A;--c-ok-bg:#064E3B;--c-ok:#6EE7B7;--c-warn-bg:#78350F;--c-warn:#FCD34D;--c-danger-bg:#7F1D1D;--c-danger:#FCA5A5}
  .stat-card.urgent{background:#78350F;color:#FCD34D;border-color:#F59E0B}
  .event-card.urgent{background:#78350F;border-left-color:#F59E0B}
  .event-card.overdue{background:var(--c-danger-bg)}
  .event-card.soon{background:var(--c-warn-bg)}
  .event-card.upcoming{background:#1E3A8A}
  .quick-date-btn{background:#374151;border-color:#4B5563;color:#F9FAFB}
  .quick-date-btn:hover{background:var(--c-primary-light);border-color:var(--c-primary)}
  .disclaimer{background:#78350F;border-color:#92400E;color:#FCD34D}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="back-link">← Назад</a>
    <h1>📅 Календарь здоровья</h1>
  </div>
</header>

<main class="container">
  <p class="subtitle">Персональный план обследований на основе вашего возраста, пола и истории анализов.</p>

  <!-- Профиль пациента -->
  <div class="patient-bar">
    <div class="patient-info">
      <span>👤 <strong id="profileName">Я</strong></span>
      <span id="profileAge"></span>
      <span id="profileSex"></span>
    </div>
    <button class="notif-btn" id="notifBtn">🔔 Включить уведомления</button>
  </div>

  <!-- Сводка -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Фильтры -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="overdue">Просрочено</button>
    <button class="filter-btn" data-filter="urgent">Срочно</button>
    <button class="filter-btn" data-filter="soon">Скоро</button>
    <button class="filter-btn" data-filter="completed">Выполнено</button>
  </div>

  <!-- Контент -->
  <div id="calendarContent"></div>

  <div class="disclaimer">
    ⚕ План составлен на основе клинических рекомендаций. Индивидуальные показания обсуждайте с врачом.
  </div>
</main>

<!-- Модальное окно планирования -->
<div class="modal-overlay" id="scheduleModal">
  <div class="modal">
    <h2 id="modalTitle">📅 Запланировать</h2>
    <p id="modalDescription"></p>
    
    <label>Быстрый выбор:</label>
    <div class="quick-dates" id="quickDates">
      <button class="quick-date-btn" data-days="7">Через неделю</button>
      <button class="quick-date-btn" data-days="14">Через 2 недели</button>
      <button class="quick-date-btn" data-days="30">Через месяц</button>
      <button class="quick-date-btn" data-days="60">Через 2 месяца</button>
      <button class="quick-date-btn" data-days="90">Через 3 месяца</button>
      <button class="quick-date-btn" data-days="180">Через полгода</button>
    </div>

    <label for="customDate">Или выберите дату:</label>
    <input type="date" id="customDate">

    <div class="modal-buttons">
      <button class="btn btn-primary" id="confirmSchedule">✓ Запланировать</button>
      <button class="btn btn-tertiary" id="cancelSchedule">Отмена</button>
    </div>
  </div>
</div>

<script src="calendar-engine.js"></script>
<script>
(function(){
'use strict';

var currentFilter = 'all';
var currentPlan = [];
var schedulingEventId = null;

// ═══════════════════════════════════════
// ИНИЦИАЛИЗАЦИЯ
// ═══════════════════════════════════════
function init() {
  var profileInfo = getActiveProfile();
  document.getElementById('profileName').textContent = profileInfo.name;
  document.getElementById('profileAge').textContent = profileInfo.age ? profileInfo.age + ' лет' : '';
  document.getElementById('profileSex').textContent = profileInfo.sex === 'male' ? '♂ Муж.' : profileInfo.sex === 'female' ? '♀ Жен.' : '';

  renderPlan();
  setupFilters();
  setupNotifications();
  setupScheduleModal();
}

function getActiveProfile() {
  try {
    var profiles = JSON.parse(localStorage.getItem('family_profiles_v4') || '[]');
    var activeId = localStorage.getItem('active_profile_v4') || 'self';
    var profile = profiles.find(function(p) { return p.id === activeId; });
    return {
      name: profile ? profile.name : 'Я',
      sex: 'any',
      age: 35
    };
  } catch (e) {
    return { name: 'Я', sex: 'any', age: 35 };
  }
}

// ═══════════════════════════════════════
// РЕНДЕР ПЛАНА
// ═══════════════════════════════════════
function renderPlan() {
  var profile = getActiveProfile();
  currentPlan = window.HealthCalendar.generatePlan(profile);
  var stats = window.HealthCalendar.getStats(currentPlan);

  renderStats(stats);
  renderEvents();
}

function renderStats(stats) {
  var html = '';
  html += '<div class="stat-card overdue"><h3>⚠ Просрочено</h3><div class="number">' + stats.overdue + '</div></div>';
  html += '<div class="stat-card urgent"><h3>🔥 Срочно (7 дн.)</h3><div class="number">' + stats.urgent + '</div></div>';
  html += '<div class="stat-card soon"><h3>📅 Скоро (30 дн.)</h3><div class="number">' + stats.soon + '</div></div>';
  html += '<div class="stat-card completed"><h3>✓ Выполнено за год</h3><div class="number">' + stats.completedThisYear + '</div></div>';
  document.getElementById('statsGrid').innerHTML = html;
}

function renderEvents() {
  var container = document.getElementById('calendarContent');
  
  var filtered = currentPlan.filter(function(e) {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'completed') return e.status === 'completed';
    return e.status === currentFilter;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><h2>Всё в порядке!</h2><p>Нет событий с выбранным статусом.</p></div>';
    return;
  }

  // Группируем по категориям
  var grouped = {};
  filtered.forEach(function(e) {
    if (!grouped[e.category]) grouped[e.category] = [];
    grouped[e.category].push(e);
  });

  var html = '';
  Object.keys(grouped).forEach(function(category) {
    html += '<section class="category-section">';
    html += '<h2 class="category-title">' + category + '</h2>';
    grouped[category].forEach(function(e) {
      html += renderEventCard(e);
    });
    html += '</section>';
  });

  container.innerHTML = html;
  attachEventHandlers();
}

function renderEventCard(e) {
  var statusLabels = {
    overdue: 'Просрочено',
    urgent: 'Срочно',
    soon: 'Скоро',
    upcoming: 'Впереди',
    planned: 'Запланировано',
    completed: 'Выполнено'
  };

  var dateInfo = '';
  if (e.status === 'overdue') {
    dateInfo = '⚠ Было нужно ' + Math.abs(e.daysUntil) + ' дн. назад';
  } else if (e.status === 'urgent') {
    dateInfo = '🔥 Осталось ' + e.daysUntil + ' дн.';
  } else if (e.status === 'soon') {
    dateInfo = '📅 Через ' + e.daysUntil + ' дн.';
  } else if (e.daysUntil > 365) {
    dateInfo = '📆 Через ' + Math.floor(e.daysUntil / 365) + ' г. ' + (e.daysUntil % 365 > 30 ? Math.floor((e.daysUntil % 365) / 30) + ' мес.' : '');
  } else if (e.daysUntil > 30) {
    dateInfo = '📆 Через ' + Math.floor(e.daysUntil / 30) + ' мес.';
  } else {
    dateInfo = '📆 Через ' + e.daysUntil + ' дн.';
  }

  var lastInfo = '';
  if (e.lastCompleted) {
    var lastDate = new Date(e.lastCompleted);
    var daysAgo = Math.floor((Date.now() - e.lastCompleted) / (24 * 60 * 60 * 1000));
    lastInfo = '<span>📋 Последнее: <strong>' + lastDate.toLocaleDateString('ru-RU') + '</strong> (' + daysAgo + ' дн. назад)</span>';
  } else {
    lastInfo = '<span>📋 <strong>Ещё не делали</strong></span>';
  }

  var actions = '';
  actions += '<button class="btn btn-primary" data-action="complete" data-id="' + e.id + '">✓ Сделано</button>';
  actions += '<button class="btn btn-secondary" data-action="schedule" data-id="' + e.id + '">📅 Запланировать</button>';
  if (e.daysUntil < 0 || e.daysUntil > 7) {
    actions += '<button class="btn btn-tertiary" data-action="postpone" data-id="' + e.id + '">⏰ Напомнить позже</button>';
  }

  return '<div class="event-card ' + e.status + '">' +
    '<div class="event-header">' +
      '<div class="event-title"><span class="icon">' + e.icon + '</span>' + e.title + '</div>' +
      '<span class="event-badge ' + e.status + '">' + statusLabels[e.status] + '</span>' +
    '</div>' +
    '<div class="event-description">' + e.description + '</div>' +
    '<div class="event-meta">' +
      '<span>' + dateInfo + '</span>' +
      lastInfo +
    '</div>' +
    '<div class="event-actions">' + actions + '</div>' +
  '</div>';
}

function attachEventHandlers() {
  document.querySelectorAll('[data-action="complete"]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.dataset.id;
      window.HealthCalendar.markCompleted(id);
      renderPlan();
      showNotification('✓ Отмечено как выполненное!', 'Запись добавлена в историю. Следующее напоминание будет рассчитано автоматически.');
    });
  });

  document.querySelectorAll('[data-action="schedule"]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      openScheduleModal(this.dataset.id);
    });
  });

  document.querySelectorAll('[data-action="postpone"]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.dataset.id;
      window.HealthCalendar.postpone(id, 30);
      renderPlan();
      showNotification('⏰ Отложено на 30 дней', 'Мы напомним вам позже.');
    });
  });
}

// ═══════════════════════════════════════
// ФИЛЬТРЫ
// ═══════════════════════════════════════
function setupFilters() {
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      renderEvents();
    });
  });
}

// ═══════════════════════════════════════
// МОДАЛКА ПЛАНИРОВАНИЯ
// ═══════════════════════════════════════
function setupScheduleModal() {
  var modal = document.getElementById('scheduleModal');
  
  document.getElementById('cancelSchedule').addEventListener('click', function() {
    modal.classList.remove('active');
    schedulingEventId = null;
  });

  modal.addEventListener('click', function(e) {
    if (e.target === modal) {
      modal.classList.remove('active');
      schedulingEventId = null;
    }
  });

  document.querySelectorAll('.quick-date-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var days = parseInt(this.dataset.days);
      var date = new Date(Date.now() + days * 24 * 60 * 60 * 1000);
      document.getElementById('customDate').value = date.toISOString().split('T')[0];
    });
  });

  document.getElementById('confirmSchedule').addEventListener('click', function() {
    var dateValue = document.getElementById('customDate').value;
    if (!dateValue) {
      alert('Выберите дату');
      return;
    }
    var date = new Date(dateValue).getTime() + 12 * 60 * 60 * 1000; // полдень
    window.HealthCalendar.scheduleEvent(schedulingEventId, date);
    modal.classList.remove('active');
    schedulingEventId = null;
    renderPlan();
    showNotification('📅 Запланировано!', 'Уведомление придёт в выбранную дату.');
  });
}

function openScheduleModal(eventId) {
  schedulingEventId = eventId;
  var rec = window.HealthCalendar.recommendations.find(function(r) { return r.id === eventId; });
  if (!rec) return;

  document.getElementById('modalTitle').textContent = '📅 Запланировать: ' + rec.title;
  document.getElementById('modalDescription').textContent = rec.description;
  
  var defaultDate = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000);
  document.getElementById('customDate').value = defaultDate.toISOString().split('T')[0];
  document.getElementById('customDate').min = new Date().toISOString().split('T')[0];

  document.getElementById('scheduleModal').classList.add('active');
}

// ═══════════════════════════════════════
// УВЕДОМЛЕНИЯ
// ═══════════════════════════════════════
function setupNotifications() {
  var btn = document.getElementById('notifBtn');
  updateNotifButton();

  btn.addEventListener('click', async function() {
    if (this.classList.contains('denied')) {
      alert('Уведомления заблокированы. Разрешите их в настройках браузера.');
      return;
    }
    var result = await window.HealthCalendar.requestPermission();
    updateNotifButton();
    if (result === 'granted') {
      window.HealthCalendar.sendImmediateNotification(
        '🎉 Уведомления включены!',
        'Мы будем напоминать о важных обследованиях.'
      );
    }
  });
}

function updateNotifButton() {
  var btn = document.getElementById('notifBtn');
  if (!('Notification' in window)) {
    btn.textContent = '❌ Не поддерживается';
    btn.classList.add('denied');
    return;
  }
  if (Notification.permission === 'granted') {
    btn.textContent = '🔔 Уведомления включены';
    btn.classList.add('granted');
    btn.classList.remove('denied');
  } else if (Notification.permission === 'denied') {
    btn.textContent = '🔕 Уведомления заблокированы';
    btn.classList.add('denied');
  } else {
    btn.textContent = '🔔 Включить уведомления';
    btn.classList.remove('granted', 'denied');
  }
}

function showNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    window.HealthCalendar.sendImmediateNotification(title, body);
  }
}

// Запуск
init();

})();
</script>
