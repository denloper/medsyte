<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8BAF8B">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233D8B4E'/><text x='50' y='65' font-size='60' text-anchor='middle'>🩺</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
  <title>Календарь здоровья</title>
</head>
<body>

<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span id="toastText">Готово</span>
</div>

<div class="app">
  
  <div class="status-bar animate-on-scroll animate-fade-in">
    <span id="currentTime">9:41</span>
    <div class="status-icons">
      <span>📶</span>
      <span>📡</span>
      <span class="pulse-dot">🔋</span>
    </div>
  </div>

  <!-- Header -->
  <div class="patient-card animate-on-scroll animate-fade-up" style="padding: 16px 20px;">
    <div class="pc-top" style="margin-bottom: 0;">
      <div class="pc-identity">
        <a href="index.html" class="circle-btn ripple-element">←</a>
        <div>
          <div class="pc-name">Календарь здоровья</div>
          <div class="pc-id" id="profileInfo">Персональный план</div>
        </div>
      </div>
      <button class="circle-btn dark-btn ripple-element" id="notifBtn" onclick="requestNotifications()">🔔</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="sec-hd animate-on-scroll animate-slide-left">
    <h2>Состояние</h2>
  </div>

  <div class="vitals-grid stagger" id="statsGrid"></div>

  <!-- Filters -->
  <div class="filter-row animate-on-scroll animate-fade-in" id="filterRow">
    <button class="filter-chip active ripple-element click-scale" data-filter="all">Все</button>
    <button class="filter-chip ripple-element click-scale" data-filter="overdue">Просрочено</button>
    <button class="filter-chip ripple-element click-scale" data-filter="urgent">Срочно</button>
    <button class="filter-chip ripple-element click-scale" data-filter="soon">Скоро</button>
    <button class="filter-chip ripple-element click-scale" data-filter="completed">Выполнено</button>
  </div>

  <!-- Events -->
  <div id="eventsContainer"></div>

  <div style="padding: 16px; background: #FFF8E1; border-radius: var(--r-md); margin: 14px 0; font-size: 13px; color: #92400E; line-height: 1.5;" class="animate-on-scroll animate-fade-up">
    ⚕️ План составлен на основе клинических рекомендаций. Индивидуальные показания обсуждайте с врачом.
  </div>

  <div style="height: 100px;"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <span class="nav-label">Главная</span>
    </a>
    <a href="upload.html" class="nav-item">
      <div class="nav-icon">📄</div>
      <span class="nav-label">Анализы</span>
    </a>
    <a href="index.html" class="nav-fab">🩺</a>
    <a href="calendar.html" class="nav-item active">
      <div class="nav-icon">
        📅
        <span class="nav-badge" id="urgentBadge">0</span>
      </div>
      <span class="nav-label">Календарь</span>
    </a>
    <a href="diary.html" class="nav-item">
      <div class="nav-icon">📓</div>
      <span class="nav-label">Дневник</span>
    </a>
  </div>
</div>

<!-- Schedule Modal -->
<div class="modal-overlay" id="scheduleModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Запланировать</div>
      <button class="modal-close ripple-element" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="calendar-engine.js"></script>
<script src="animations.js"></script>
<script>
(function(){
  'use strict';

  let currentFilter = 'all';
  let currentPlan = [];
  let schedulingEventId = null;

  function updateTime() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('currentTime').textContent = `${h}:${m}`;
  }
  updateTime();
  setInterval(updateTime, 60000);

  window.showToast = function(text, icon = '✓') {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = text;
    toast.querySelector('.toast-icon').textContent = icon;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  };


  function renderPlan() {
    const profile = getProfile();
    document.getElementById('profileInfo').textContent = 'Персональный план';
    
    currentPlan = window.HealthCalendar ? window.HealthCalendar.generatePlan(profile) : [];
    const stats = window.HealthCalendar ? window.HealthCalendar.getStats(currentPlan) : { overdue: 0, urgent: 0, soon: 0, upcoming: 0, completedThisYear: 0, total: 0 };

    document.getElementById('urgentBadge').textContent = stats.urgent + stats.overdue;

    // Stats
    document.getElementById('statsGrid').innerHTML = `
      <div class="v-card tilt-card ripple-element">
        <div class="v-icon red">⚠</div>
        <div class="v-label">Просрочено</div>
        <div class="v-value"><span data-counter="${stats.overdue}">${stats.overdue}</span></div>
      </div>
      <div class="v-card tilt-card ripple-element">
        <div class="v-icon amber">🔥</div>
        <div class="v-label">Срочно</div>
        <div class="v-value"><span data-counter="${stats.urgent}">${stats.urgent}</span></div>
      </div>
      <div class="v-card tilt-card ripple-element">
        <div class="v-icon blue">📅</div>
        <div class="v-label">Скоро</div>
        <div class="v-value"><span data-counter="${stats.soon}">${stats.soon}</span></div>
      </div>
      <div class="v-card tilt-card ripple-element">
        <div class="v-icon green">✓</div>
        <div class="v-label">За год</div>
        <div class="v-value"><span data-counter="${stats.completedThisYear}">${stats.completedThisYear}</span></div>
      </div>
    `;

    setTimeout(() => {
      document.querySelectorAll('#statsGrid [data-counter]').forEach(el => {
        if (window.AnimationsEngine) {
          window.AnimationsEngine.animateCounter(el, parseInt(el.dataset.counter), 1000);
        }
      });
    }, 300);

    renderEvents();
  }

  function renderEvents() {
    const filtered = currentPlan.filter(e => {
      if (currentFilter === 'all') return true;
      if (currentFilter === 'completed') return e.status === 'completed';
      return e.status === currentFilter;
    });

    const container = document.getElementById('eventsContainer');
    
    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state animate-on-scroll animate-fade-up">
          <div class="empty-icon">🎉</div>
          <div class="empty-title">Всё в порядке!</div>
          <div class="empty-sub">Нет событий с таким статусом</div>
        </div>
      `;
      return;
    }

    // Group by category
    const grouped = {};
    filtered.forEach(e => {
      if (!grouped[e.category]) grouped[e.category] = [];
      grouped[e.category].push(e);
    });

    let html = '';
    let idx = 0;
    Object.entries(grouped).forEach(([category, events]) => {
      html += `
        <div class="sec-hd animate-on-scroll animate-slide-left" style="animation-delay: ${idx * 0.05}s;">
          <h2>${category}</h2>
          <span class="see-all">${events.length}</span>
        </div>
      `;
      
      events.forEach((e, eIdx) => {
        const statusLabels = {
          overdue: 'Просрочено', urgent: 'Срочно', soon: 'Скоро',
          upcoming: 'Впереди', planned: 'Запланировано', completed: 'Выполнено'
        };
        const statusColors = {
          overdue: 'red', urgent: 'red', soon: 'orange',
          upcoming: 'blue', planned: 'green', completed: 'green'
        };
        const color = statusColors[e.status] || 'blue';
        
        let dateInfo = '';
        if (e.status === 'overdue') {
          dateInfo = `⚠ Было ${Math.abs(e.daysUntil)} дн. назад`;
        } else if (e.status === 'urgent') {
          dateInfo = `🔥 Осталось ${e.daysUntil} дн.`;
        } else if (e.daysUntil > 365) {
          dateInfo = `📆 Через ${Math.floor(e.daysUntil / 365)} г.`;
        } else if (e.daysUntil > 30) {
          dateInfo = `📆 Через ${Math.floor(e.daysUntil / 30)} мес.`;
        } else {
          dateInfo = `📆 Через ${e.daysUntil} дн.`;
        }

        html += `
          <div class="other-card animate-on-scroll animate-fade-up tilt-card" style="border-left: 4px solid var(--${color}); animation-delay: ${(idx + eIdx) * 0.06}s;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
              <div style="display: flex; gap: 12px; align-items: center; flex: 1;">
                <div style="font-size: 28px;">${e.icon}</div>
                <div style="flex: 1;">
                  <div style="font-size: 16px; font-weight: 800; color: var(--dark); margin-bottom: 2px;">${e.title}</div>
                  <div style="font-size: 12px; color: var(--text-3);">${e.description}</div>
                </div>
              </div>
              <div style="padding: 4px 10px; background: var(--${color}); color: white; border-radius: var(--r-full); font-size: 11px; font-weight: 700;">
                ${statusLabels[e.status]}
              </div>
            </div>
            
            <div style="padding: 10px; background: var(--surface-2); border-radius: var(--r-sm); margin-bottom: 10px; font-size: 13px; color: var(--text-2);">
              ${dateInfo}
              ${e.lastCompleted ? `<br><span style="color: var(--text-3);">📋 Последнее: ${new Date(e.lastCompleted).toLocaleDateString('ru-RU')}</span>` : ''}
            </div>

            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
              <button class="pill pill-green ripple-element click-scale" onclick="markCompleted('${e.id}')">✓ Сделано</button>
              <button class="pill pill-outline ripple-element click-scale" onclick="openSchedule('${e.id}')">📅 Запланировать</button>
              ${e.daysUntil < 0 || e.daysUntil > 7 ? `<button class="pill pill-outline ripple-element click-scale" onclick="postpone('${e.id}')">⏰ Позже</button>` : ''}
            </div>
          </div>
        `;
        idx++;
      });
    });

    container.innerHTML = html;
  }

  // Filters
  document.querySelectorAll('#filterRow .filter-chip').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#filterRow .filter-chip').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      renderEvents();
    });
  });

  window.markCompleted = function(id) {
    if (window.HealthCalendar) {
      window.HealthCalendar.markCompleted(id);
      renderPlan();
      showToast('Отмечено как выполненное', '✓');
    }
  };

  window.postpone = function(id) {
    if (window.HealthCalendar) {
      window.HealthCalendar.postpone(id, 30);
      renderPlan();
      showToast('Отложено на 30 дней', '⏰');
    }
  };

  window.openSchedule = function(id) {
    schedulingEventId = id;
    const rec = window.HealthCalendar.recommendations.find(r => r.id === id);
    if (!rec) return;

    document.getElementById('modalTitle').textContent = `📅 ${rec.title}`;
    
    const defaultDate = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000);
    const minDate = new Date().toISOString().split('T')[0];

    document.getElementById('modalBody').innerHTML = `
      <p style="color: var(--text-2); margin-bottom: 16px; font-size: 14px;">${rec.description}</p>
      
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px;">
        <button class="pill pill-outline ripple-element click-scale" onclick="setQuickDate(7)">Неделя</button>
        <button class="pill pill-outline ripple-element click-scale" onclick="setQuickDate(30)">Месяц</button>
        <button class="pill pill-outline ripple-element click-scale" onclick="setQuickDate(90)">3 месяца</button>
      </div>

      <div style="margin-bottom: 16px;">
        <label style="font-size: 12px; color: var(--text-3); display: block; margin-bottom: 6px;">Или выберите дату</label>
        <input type="date" id="customDate" value="${defaultDate.toISOString().split('T')[0]}" min="${minDate}"
               style="width: 100%; padding: 12px 14px; border: 1.5px solid #C8DCC8; border-radius: var(--r-sm); font-family: inherit; font-size: 15px; background: var(--surface-2);">
      </div>

      <button class="next-btn magnetic-btn ripple-element" onclick="confirmSchedule()">✓ Запланировать</button>
    `;

    document.getElementById('scheduleModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.setQuickDate = function(days) {
    const date = new Date(Date.now() + days * 24 * 60 * 60 * 1000);
    document.getElementById('customDate').value = date.toISOString().split('T')[0];
  };

  window.confirmSchedule = function() {
    const dateValue = document.getElementById('customDate').value;
    if (!dateValue) {
      showToast('Выберите дату', '⚠️');
      return;
    }
    const date = new Date(dateValue).getTime() + 12 * 60 * 60 * 1000;
    if (window.HealthCalendar) {
      window.HealthCalendar.scheduleEvent(schedulingEventId, date);
      closeModal();
      renderPlan();
      showToast('Запланировано', '📅');
    }
  };

  window.closeModal = function() {
    document.getElementById('scheduleModal').classList.remove('open');
    document.body.style.overflow = '';
    schedulingEventId = null;
  };

  window.requestNotifications = async function() {
    if (!('Notification' in window)) {
      showToast('Не поддерживается', '❌');
      return;
    }
    if (Notification.permission === 'granted') {
      showToast('Уже включены', '🔔');
      return;
    }
    const result = await Notification.requestPermission();
    if (result === 'granted') {
      showToast('Уведомления включены', '🔔');
      new Notification('Семейный доктор', {
        body: 'Будем напоминать о важных обследованиях',
        icon: './manifest.json'
      });
    } else {
      showToast('Отключены', '🔕');
    }
  };

  // Init
  renderPlan();

  document.getElementById('scheduleModal').addEventListener('click', (e) => {
    if (e.target.id === 'scheduleModal') closeModal();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW:', err));
  }
})();
</script>

</body>
</html>
